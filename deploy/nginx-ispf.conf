# ISPF web console + API reverse proxy (install to /etc/nginx/sites-enabled/ispf)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ispf.example.invalid;

    ssl_certificate     /etc/letsencrypt/live/ispf.example.invalid/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ispf.example.invalid/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ISPF_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /opt/ispf/web-console;
    index index.html;
    client_max_body_size 128m;

    # AI agent turns: many LLM round-trips — default /api/ 180s causes 504 Gateway Timeout
    location ~ ^/api/v1/(ai/agent|operator-apps/[^/]+/agent)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_connect_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /hmi/api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_read_timeout 86400;
    }

    location /hmi/ws/ {
        proxy_pass http://127.0.0.1:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_read_timeout 86400;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Anima operator SPA (printing contour) — separate static bundle, same API origin
    location /operator-printing/ {
        alias /opt/ispf/operator-printing/html/;
        try_files $uri $uri/ @operator_printing_spa;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location @operator_printing_spa {
        root /opt/ispf/operator-printing/html;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /operator-printing/index.html {
        alias /opt/ispf/operator-printing/html/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /operator-printing/assets/ {
        alias /opt/ispf/operator-printing/html/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Hashed build assets — never SPA-fallback (broken JS MIME = blank UI after deploy)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ^~ /operator-apps/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ispf.example.invalid;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.example.invalid;
    ssl_certificate     /etc/letsencrypt/live/ai.example.invalid/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.example.invalid/privkey.pem;
    return 301 https://ispf.example.invalid$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name ai.example.invalid;
    return 301 https://ispf.example.invalid$request_uri;
}
