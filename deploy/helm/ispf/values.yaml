# ISPF Helm values (BL-186). Prod reference: deploy/vps-deploy-direct.ps1 + deploy/docker-compose.*.yml

configMap:
  enabled: true
  # Optional full override; when empty, chart renders datasource + ispf.* from values below.
  applicationYaml: ""

global:
  imageRegistry: ""
  storageClass: ""

replicaCount: 1

image:
  server:
    repository: eclipse-temurin
    tag: "25-jre-jammy"
    pullPolicy: IfNotPresent
  nginx:
    repository: nginx
    tag: "1.27.4-alpine"
    pullPolicy: IfNotPresent

ispf:
  version: "0.9.32"
  cluster:
    enabled: false
    replicaId: replica-1
    role: all
  server:
    port: 8080
    javaOpts: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    profiles: local
  bootstrap:
    fixturesEnabled: false
  driverPacksDir: /opt/ispf/drivers
  license:
    enforce: false
    requireSignedBundles: false
  nats:
    enabled: false
  redis:
    enabled: true
    host: ispf-redis
    port: 6379
  clickhouse:
    enabled: false
  historian:
    store: postgres

postgresql:
  enabled: true
  auth:
    database: ispf
    username: ispf
    password: ispf
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: ispf.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

secrets:
  create: true
  # When set, chart references an existing Secret instead of rendering secret.yaml.
  existingSecret: ""
  # Defaults to postgresql.auth.password when empty.
  dbPassword: ""

service:
  type: ClusterIP
  port: 80

resources:
  server:
    limits:
      cpu: "2"
      memory: 1536Mi
    requests:
      cpu: 500m
      memory: 768Mi
  nginx:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

persistence:
  data:
    enabled: true
    size: 10Gi
    storageClass: ""
  drivers:
    enabled: true
    size: 2Gi
    storageClass: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Edge / ARM profile hints — see deploy/docker-compose.edge-arm.yml
edge:
  enabled: false
  arm64: false
  federation:
    outboundTunnel: true

# BL-207: dedicated analytics replicas (rollup materializer, heavy backfill).
# When replicaCount > 0, main Deployment should use edge-api/io profiles; analytics pods
# run ISPF_REPLICA_PROFILE=analytics with optional affinity to the ClickHouse zone.
analytics:
  enabled: false
  replicaCount: 1
  replicaIdPrefix: analytics
  profile: analytics
  materializerEnabled: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    limits:
      cpu: "2"
      memory: 1536Mi
    requests:
      cpu: 500m
      memory: 768Mi
