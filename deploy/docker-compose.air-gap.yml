# Self-contained air-gap stack (BL-128). Paths relative to bundle root after extract.
# Usage: bash deploy/air-gap-apply.sh ispf-airgap-<version>.tar.gz

services:
  postgres:
    image: ${ISPF_AIRGAP_POSTGRES_IMAGE:-timescale/timescaledb:2.17.2-pg16}
    environment:
      POSTGRES_DB: ispf
      POSTGRES_USER: ispf
      POSTGRES_PASSWORD: ispf
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ispf_airgap_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ispf -d ispf"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: ${ISPF_AIRGAP_REDIS_IMAGE:-redis:7.4.2-alpine}
    ports:
      - "127.0.0.1:6379:6379"

  ispf-server:
    image: ${ISPF_AIRGAP_JRE_IMAGE:-eclipse-temurin:25-jre-jammy}
    working_dir: /opt/ispf
    command: ["java", "-jar", "/opt/ispf/ispf-server.jar"]
    environment:
      ISPF_DB_URL: jdbc:postgresql://postgres:5432/ispf
      ISPF_DB_USER: ispf
      ISPF_DB_PASSWORD: ispf
      ISPF_SERVER_PORT: "8080"
      ISPF_BOOTSTRAP_FIXTURES_ENABLED: "false"
      ISPF_DRIVER_PACKS_DIR: /opt/ispf/drivers
      ISPF_LICENSE_ENFORCE: ${ISPF_LICENSE_ENFORCE:-false}
      ISPF_LICENSE_REQUIRE_SIGNED_BUNDLES: ${ISPF_LICENSE_REQUIRE_SIGNED_BUNDLES:-false}
      ISPF_LICENSE_PUBLIC_KEY_PEM: ${ISPF_LICENSE_PUBLIC_KEY_PEM:-}
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./artifacts/ispf-server.jar:/opt/ispf/ispf-server.jar:ro
      - ./artifacts/drivers:/opt/ispf/drivers:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ${ISPF_AIRGAP_NGINX_IMAGE:-nginx:1.27.4-alpine}
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./artifacts/web-console:/usr/share/nginx/html:ro
      - ./deploy/nginx-local-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server

  clickhouse:
    profiles: [clickhouse]
    image: ${ISPF_AIRGAP_CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:24.8.12.60}
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ispf_airgap_ch:/var/lib/clickhouse

volumes:
  ispf_airgap_pg:
  ispf_airgap_ch:
