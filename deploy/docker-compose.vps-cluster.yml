# Prod VPS: full ADR-0032 cluster — edge-api + hmi-read (nginx LB), io + compute (internal).
# Host network; postgres/redis run separately on the VPS host.

version: "3.8"

x-ispf-server: &ispf-server
  image: eclipse-temurin:25-jre-jammy
  working_dir: /opt/ispf
  network_mode: host
  volumes:
    - /opt/ispf/ispf-server.jar:/opt/ispf/ispf-server.jar:ro
    - /opt/ispf/data/drivers:/opt/ispf/drivers:ro
    - /opt/ispf/data:/opt/ispf/data
  command: ["java", "-jar", "/opt/ispf/ispf-server.jar", "--spring.profiles.active=local"]
  env_file:
    - /opt/ispf/ispf-server.env
  environment: &ispf-env
    ISPF_CLUSTER_ENABLED: "true"
    ISPF_NATS_ENABLED: "true"
    ISPF_NATS_URL: nats://127.0.0.1:4222
    ISPF_NATS_REPLICA_EVENTS: "true"
    ISPF_REDIS_ENABLED: "true"
    ISPF_REDIS_HOST: 127.0.0.1
    ISPF_CLUSTER_LIVE_VARIABLE_SYNC: "true"
    ISPF_CLUSTER_PATH_INTEREST: "true"
    ISPF_CLUSTER_LIVE_VARIABLE_SYNC_COALESCE_MS: "500"
    ISPF_DRIVER_PACKS_DIR: /opt/ispf/drivers
    JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
  restart: unless-stopped

services:
  nats:
    image: nats:2.10-alpine
    container_name: ispf-nats
    network_mode: host
    command: ["-js", "-m", "8222", "-p", "4222"]
    restart: unless-stopped

  ispf-server-1:
    <<: *ispf-server
    container_name: ispf-vps-replica-1
    environment:
      <<: *ispf-env
      ISPF_REPLICA_ID: replica-1
      ISPF_REPLICA_PROFILE: edge-api
      ISPF_SERVER_PORT: "8081"

  ispf-server-2:
    <<: *ispf-server
    container_name: ispf-vps-replica-2
    environment:
      <<: *ispf-env
      ISPF_REPLICA_ID: replica-2
      ISPF_REPLICA_PROFILE: hmi-read
      ISPF_SERVER_PORT: "8082"

  ispf-server-3:
    <<: *ispf-server
    container_name: ispf-vps-replica-3
    environment:
      <<: *ispf-env
      ISPF_REPLICA_ID: replica-3
      ISPF_REPLICA_PROFILE: io
      ISPF_SERVER_PORT: "8083"

  ispf-server-worker-1:
    <<: *ispf-server
    container_name: ispf-vps-worker-1
    environment:
      <<: *ispf-env
      ISPF_REPLICA_ID: worker-1
      ISPF_REPLICA_PROFILE: compute
      ISPF_SERVER_PORT: "8084"
      ISPF_CLUSTER_JOB_MAX_CONCURRENT: "4"

  nginx:
    image: nginx:1.27.4-alpine
    container_name: ispf-vps-nginx
    network_mode: host
    volumes:
      - /opt/ispf/web-console:/usr/share/nginx/html:ro
      - /opt/ispf/nginx-vps-cluster.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server-1
      - ispf-server-2
    restart: unless-stopped
