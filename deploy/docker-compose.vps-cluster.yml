# Prod VPS: single unified node (legacy role "all") — all capabilities on one JVM.
# Cluster disabled (ADR-0032 forbids jobs+drivers on one JVM when cluster.enabled=true).

version: "3.8"

x-ispf-server: &ispf-server
  image: eclipse-temurin:25-jre-jammy
  working_dir: /opt/ispf
  network_mode: host
  volumes:
    - /opt/ispf/ispf-server.jar:/opt/ispf/ispf-server.jar:ro
    - /opt/ispf/data/drivers:/opt/ispf/drivers:ro
    - /opt/ispf/data:/opt/ispf/data
  command: ["java", "-jar", "/opt/ispf/ispf-server.jar", "--spring.profiles.active=local"]
  env_file:
    - /opt/ispf/ispf-server.env
  environment: &ispf-env
    ISPF_CLUSTER_ENABLED: "false"
    ISPF_NATS_ENABLED: "false"
    ISPF_REDIS_ENABLED: "true"
    ISPF_REDIS_HOST: 127.0.0.1
    ISPF_DRIVER_PACKS_DIR: /opt/ispf/drivers
    JAVA_TOOL_OPTIONS: "-Xms256m -Xmx1024m -XX:+UseG1GC"
  restart: unless-stopped

services:
  ispf-server-1:
    <<: *ispf-server
    container_name: ispf-vps-replica-1
    environment:
      <<: *ispf-env
      ISPF_REPLICA_ID: replica-1
      ISPF_SERVER_PORT: "8081"

  nginx:
    image: nginx:1.27.4-alpine
    container_name: ispf-vps-nginx
    network_mode: host
    volumes:
      - /opt/ispf/web-console:/usr/share/nginx/html:ro
      - /opt/ispf/nginx-vps-cluster.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server-1
    restart: unless-stopped
