# User-level ISPF lab stack (PostgreSQL + Scylla + MQTT + server + UI).
# Usage: ISPF_LAB_ROOT=~/ispf docker compose -f lab-test-host-compose.yml up -d
name: ispf-lab

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ispf
      POSTGRES_USER: ispf
      POSTGRES_PASSWORD: ${ISPF_DB_PASSWORD:-ispf-lab-test}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ispf -d ispf"]
      interval: 5s
      timeout: 5s
      retries: 20

  scylla:
    image: scylladb/scylla:6.2
    restart: unless-stopped
    command:
      - "--smp"
      - "${SCYLLA_SMP:-2}"
      - "--memory"
      - "${SCYLLA_MEMORY:-4G}"
      - "--overprovisioned"
      - "1"
      - "--api-address"
      - "0.0.0.0"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    # No host port publish — bench uses Docker network (mqtt:1883), avoids docker-proxy CPU.
    # Debug: docker compose exec mqtt mosquitto_pub -h localhost -t test -m ok
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  ispf-server:
    image: eclipse-temurin:25-jre-jammy
    restart: unless-stopped
    working_dir: /opt/ispf
    volumes:
      - ./:/opt/ispf
    environment:
      ISPF_DB_URL: jdbc:postgresql://postgres:5432/ispf
      ISPF_DB_USER: ispf
      ISPF_DB_PASSWORD: ${ISPF_DB_PASSWORD:-ispf-lab-test}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ispf
      SPRING_DATASOURCE_USERNAME: ispf
      SPRING_DATASOURCE_PASSWORD: ${ISPF_DB_PASSWORD:-ispf-lab-test}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      ISPF_SERVER_PORT: "8080"
      ISPF_ENVIRONMENT: lab
      ISPF_BOOTSTRAP_FIXTURES_ENABLED: "${ISPF_BOOTSTRAP_FIXTURES_ENABLED:-false}"
      ISPF_MQTT_ENABLED: "true"
      ISPF_MQTT_BROKER_URL: tcp://mqtt:1883
      ISPF_AI_PROVIDER: noop
      ISPF_EVENT_JOURNAL_STORE: scylla
      ISPF_EVENT_JOURNAL_CASSANDRA_CONTACT_POINTS: scylla
      ISPF_EVENT_JOURNAL_CASSANDRA_PORT: "9042"
      ISPF_EVENT_JOURNAL_CASSANDRA_LOCAL_DATACENTER: datacenter1
      ISPF_EVENT_JOURNAL_CASSANDRA_KEYSPACE: ispf
      ISPF_VARIABLE_HISTORY_STORE: scylla
      ISPF_VARIABLE_HISTORY_CASSANDRA_CONTACT_POINTS: scylla
      ISPF_VARIABLE_HISTORY_CASSANDRA_PORT: "9042"
      ISPF_VARIABLE_HISTORY_CASSANDRA_LOCAL_DATACENTER: datacenter1
      ISPF_VARIABLE_HISTORY_CASSANDRA_KEYSPACE: ispf
      ISPF_DRIVER_PACKS_DIR: /opt/ispf/data/drivers
      ISPF_RUNTIME_TELEMETRY_ENABLED: "true"
      ISPF_SECURITY_RBAC_ENABLED: "true"
      ISPF_SECURITY_TOKEN_AUTH_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: local
      JAVA_TOOL_OPTIONS: "${ISPF_JAVA_OPTS:--Xms512m -Xmx4g}"
      ISPF_EVENT_JOURNAL_ASYNC_ENABLED: "${ISPF_EVENT_JOURNAL_ASYNC_ENABLED:-true}"
      ISPF_EVENT_JOURNAL_WRITER_THREADS: "${ISPF_EVENT_JOURNAL_WRITER_THREADS:-2}"
      ISPF_EVENT_JOURNAL_QUEUE_CAPACITY: "${ISPF_EVENT_JOURNAL_QUEUE_CAPACITY:-10000}"
      ISPF_EVENT_JOURNAL_BATCH_SIZE: "${ISPF_EVENT_JOURNAL_BATCH_SIZE:-200}"
      ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS: "${ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS:-100}"
      ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE: "${ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE:-2000}"
      ISPF_EVENT_JOURNAL_CASSANDRA_PARTITION_BATCH: "${ISPF_EVENT_JOURNAL_CASSANDRA_PARTITION_BATCH:-200}"
      ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES: "${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES:-8}"
      ISPF_EVENT_JOURNAL_CASSANDRA_GLOBAL_TABLE_ENABLED: "${ISPF_EVENT_JOURNAL_CASSANDRA_GLOBAL_TABLE_ENABLED:-true}"
      ISPF_EVENT_JOURNAL_CASSANDRA_ASYNC_COUNTER_UPDATE: "${ISPF_EVENT_JOURNAL_CASSANDRA_ASYNC_COUNTER_UPDATE:-true}"
      ISPF_DRIVER_MQTT_CALLBACK_THREADS: "${ISPF_DRIVER_MQTT_CALLBACK_THREADS:-4}"
      ISPF_DRIVER_MQTT_CALLBACK_QUEUE_CAPACITY: "${ISPF_DRIVER_MQTT_CALLBACK_QUEUE_CAPACITY:-10000}"
      ISPF_OBJECT_CHANGE_ASYNC_ENABLED: "${ISPF_OBJECT_CHANGE_ASYNC_ENABLED:-true}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_ENABLED: "${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_ENABLED:-true}"
      ISPF_RUNTIME_TELEMETRY_FAST_HISTORIAN_PATH: "${ISPF_RUNTIME_TELEMETRY_FAST_HISTORIAN_PATH:-true}"
      ISPF_VARIABLE_HISTORY_MIN_INTERVAL_MS: "${ISPF_VARIABLE_HISTORY_MIN_INTERVAL_MS:-5000}"
      ISPF_VARIABLE_HISTORY_WRITER_THREADS: "${ISPF_VARIABLE_HISTORY_WRITER_THREADS:-4}"
      ISPF_VARIABLE_HISTORY_QUEUE_CAPACITY: "${ISPF_VARIABLE_HISTORY_QUEUE_CAPACITY:-50000}"
      ISPF_VARIABLE_HISTORY_BATCH_SIZE: "${ISPF_VARIABLE_HISTORY_BATCH_SIZE:-1000}"
      ISPF_VARIABLE_HISTORY_FLUSH_INTERVAL_MS: "${ISPF_VARIABLE_HISTORY_FLUSH_INTERVAL_MS:-20}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_PARTITION_BATCH: "${ISPF_VARIABLE_HISTORY_CASSANDRA_PARTITION_BATCH:-200}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES: "${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES:-8}"
    command: ["java", "-jar", "/opt/ispf/ispf-server.jar"]
    depends_on:
      postgres:
        condition: service_healthy
      scylla:
        condition: service_healthy
      mqtt:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${ISPF_LAB_HTTP_PORT:-8000}:80"
    volumes:
      - ./web-console:/usr/share/nginx/html:ro
      - ./nginx-lab.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server

volumes:
  pg_data:
  scylla_data:
