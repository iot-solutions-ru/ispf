# HTTP nginx for deploy/docker-compose.cluster.yml (BL-135, ADR-0031 / Wave 6)
# API: round-robin (ADR-0028) so smoke can see ≥2 replicaId and live-var lag across replicas.
# WS: ip_hash sticky (ADR-0028). replica-3 = drivers + jobs (not in public upstream).

upstream ispf_cluster_api {
    server ispf-server-1:8080 max_fails=2 fail_timeout=10s;
    server ispf-server-2:8080 max_fails=2 fail_timeout=10s;
}

upstream ispf_cluster_ws {
    ip_hash;
    server ispf-server-1:8080 max_fails=2 fail_timeout=10s;
    server ispf-server-2:8080 max_fails=2 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://ispf_cluster_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    location /ws/ {
        proxy_pass http://ispf_cluster_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
