# Local observability stack for ISPF automation pipeline metrics.
#
# Pull path:  Prometheus scrapes ISPF /actuator/prometheus (configure target in prometheus-ispf-scrape.yml)
# Push path:  ISPF OTLP → otel-collector:4318 → prometheus exporter :8889 → Prometheus
#
# Usage:
#   docker compose -f deploy/docker-compose.observability.yml up -d
#   Open Grafana http://localhost:3000 (admin / admin)
#   Dashboard: ISPF → ISPF Automation Pipeline
#
# Point ISPF at collector (local dev):
#   ISPF_OTLP_METRICS_ENABLED=true
#   ISPF_OTLP_METRICS_URL=http://localhost:4318/v1/metrics

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-minimal.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus-observability-local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/ispf-automation-pipeline.json:/var/lib/grafana/dashboards/ispf-automation-pipeline.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
