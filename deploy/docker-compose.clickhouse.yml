# Local ClickHouse for event journal throughput testing (P3b).
# Usage:
#   docker compose -f deploy/docker-compose.clickhouse.yml up -d
#   ISPF_EVENT_JOURNAL_STORE=clickhouse
#   ISPF_EVENT_JOURNAL_CLICKHOUSE_URL=http://localhost:8123
#
# VPS: bash deploy/vps-clickhouse-setup.sh  (or vps-clickhouse-deploy.ps1 from workstation)
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ispf-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-local-user.xml:/etc/clickhouse-server/users.d/ispf-local.xml:ro

volumes:
  clickhouse-data:
