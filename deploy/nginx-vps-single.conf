# Single unified ISPF node — nginx :8080 → JVM :8081

upstream ispf_single {
    server 127.0.0.1:8081 max_fails=2 fail_timeout=10s;
}

server {
    listen 127.0.0.1:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 128m;

    location /api/ {
        proxy_pass http://ispf_single;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
    }

    # Operator mode (web console prefixes /hmi) — same unified JVM when no hmi-read replica.
    location /hmi/api/ {
        proxy_pass http://ispf_single/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
    }

    location /ws/ {
        proxy_pass http://ispf_single;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 86400;
    }

    location /hmi/ws/ {
        proxy_pass http://ispf_single/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 86400;
    }

    location /actuator/ {
        proxy_pass http://ispf_single;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
