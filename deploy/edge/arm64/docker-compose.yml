# ARM64 edge gateway profile (BL-187)
#
# Raspberry Pi 4+ (4 GB RAM), Ampere Altra, or other linux/arm64 industrial gateways.
# NAT-friendly outbound federation tunnel; lean JVM and container limits.
#
# Quick start:
#   1. Build artifacts (from repo root):
#        ./gradlew :packages:ispf-server:bootJar -x test
#        cd apps/web-console && npm ci && npm run build
#   2. Stage artifacts:
#        mkdir -p deploy/edge/arm64/artifacts/drivers
#        cp packages/ispf-server/build/libs/ispf-server-*.jar deploy/edge/arm64/artifacts/ispf-server.jar
#        cp -r apps/web-console/dist/* deploy/edge/arm64/artifacts/web-console/
#   3. Launch:
#        docker compose -f deploy/edge/arm64/docker-compose.yml up -d
#
# UI: http://127.0.0.1:8081  |  API: http://127.0.0.1:8080/api/v1/info

version: "3.8"

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    platform: linux/arm64
    environment:
      POSTGRES_DB: ispf
      POSTGRES_USER: ispf
      POSTGRES_PASSWORD: ispf
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ispf_edge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ispf -d ispf"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.4.2-alpine
    platform: linux/arm64
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M

  ispf-server:
    image: eclipse-temurin:25-jre-jammy
    platform: linux/arm64
    working_dir: /opt/ispf
    command: ["java", "-jar", "/opt/ispf/ispf-server.jar"]
    environment:
      ISPF_DB_URL: jdbc:postgresql://postgres:5432/ispf
      ISPF_DB_USER: ispf
      ISPF_DB_PASSWORD: ispf
      ISPF_SERVER_PORT: "8080"
      ISPF_CLUSTER_ENABLED: "false"
      ISPF_REPLICA_ID: edge-1
      ISPF_REPLICA_ROLE: all
      ISPF_REDIS_ENABLED: "true"
      ISPF_REDIS_HOST: redis
      ISPF_NATS_ENABLED: "false"
      ISPF_BOOTSTRAP_FIXTURES_ENABLED: "false"
      ISPF_DRIVER_PACKS_DIR: /opt/ispf/drivers
      ISPF_FEDERATION_OUTBOUND_ENABLED: "true"
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseG1GC"
      SPRING_PROFILES_ACTIVE: local
    volumes:
      - ${ISPF_SERVER_JAR:-./artifacts/ispf-server.jar}:/opt/ispf/ispf-server.jar:ro
      - ${ISPF_DRIVER_PACKS:-./artifacts/drivers}:/opt/ispf/drivers:ro
      - ispf_edge_data:/opt/ispf/data
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27.4-alpine
    platform: linux/arm64
    volumes:
      - ${ISPF_WEB_CONSOLE:-./artifacts/web-console}:/usr/share/nginx/html:ro
      - ../../nginx-edge.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - ispf-server
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  ispf_edge_pg:
  ispf_edge_data:
