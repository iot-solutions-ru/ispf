# ISPF SNMP agent — localhost monitoring (community: public)
# Managed by ISPF deploy; overrides default Ubuntu snmpd access rules.

sysLocation ai.iot-solutions.ru
sysContact root@ai.iot-solutions.ru

# Listen only on loopback (ISPF polls 127.0.0.1)
agentaddress udp:127.0.0.1:161,udp6:[::1]:161

# Full MIB-II + HOST-RESOURCES + IF-MIB for platform monitoring
view ispf_monitor included .1.3.6.1.2.1.1
view ispf_monitor included .1.3.6.1.2.1.2
view ispf_monitor included .1.3.6.1.2.1.25
view ispf_monitor included .1.3.6.1.2.1.31

rocommunity public 127.0.0.1 -V ispf_monitor
rocommunity public ::1 -V ispf_monitor
