# ISPF horizontal cluster — isolated lab stack (does not replace ispf-lab stress stack).
# Usage on lab: docker compose -f lab-cluster-compose.yml up -d
name: ispf-cluster-lab

x-ispf-server-image: &ispf-server-image
  image: eclipse-temurin:25-jre-jammy
  working_dir: /opt/ispf
  volumes:
    - ./cluster-staging/ispf-server.jar:/opt/ispf/ispf-server.jar:ro
    - ./data/drivers:/opt/ispf/drivers:ro
  command: ["java", "-jar", "/opt/ispf/ispf-server.jar"]

x-ispf-server-env: &ispf-server-env
  ISPF_DB_URL: jdbc:postgresql://postgres:5432/ispf
  ISPF_DB_USER: ispf
  ISPF_DB_PASSWORD: ispf-cluster-lab
  ISPF_SERVER_PORT: "8080"
  ISPF_ENVIRONMENT: lab-cluster
  ISPF_BOOTSTRAP_FIXTURES_ENABLED: "true"
  SPRING_PROFILES_ACTIVE: local
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ispf
  SPRING_DATASOURCE_USERNAME: ispf
  SPRING_DATASOURCE_PASSWORD: ispf-cluster-lab
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
  ISPF_CLUSTER_ENABLED: "true"
  ISPF_NATS_ENABLED: "true"
  ISPF_NATS_URL: nats://nats:4222
  ISPF_NATS_REPLICA_EVENTS: "true"
  ISPF_REDIS_ENABLED: "true"
  ISPF_REDIS_HOST: redis
  ISPF_SECURITY_RBAC_ENABLED: "true"
  ISPF_SECURITY_TOKEN_AUTH_ENABLED: "true"
  ISPF_AI_PROVIDER: noop
  ISPF_DRIVER_PACKS_DIR: /opt/ispf/drivers
  JAVA_TOOL_OPTIONS: "-Xms256m -Xmx1536m"

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ispf
      POSTGRES_USER: ispf
      POSTGRES_PASSWORD: ispf-cluster-lab
    ports:
      - "127.0.0.1:5432:5432"
      - "${ISPF_CLUSTER_LAN_BIND:-127.0.0.1}:5433:5432"
    volumes:
      - cluster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ispf -d ispf"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "${ISPF_CLUSTER_LAN_BIND:-127.0.0.1}:6380:6379"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${ISPF_CLUSTER_LAN_BIND:-127.0.0.1}:4223:4222"

  ispf-server-1:
    <<: *ispf-server-image
    environment:
      <<: *ispf-server-env
      ISPF_REPLICA_ID: replica-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  ispf-server-2:
    <<: *ispf-server-image
    environment:
      <<: *ispf-server-env
      ISPF_REPLICA_ID: replica-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  ispf-server-3:
    <<: *ispf-server-image
    environment:
      <<: *ispf-server-env
      ISPF_REPLICA_ID: replica-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started

  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "0.0.0.0:${ISPF_LAB_CLUSTER_PORT:-8000}:80"
    volumes:
      - ./web-console:/usr/share/nginx/html:ro
      - ./nginx-cluster-lab.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server-1
      - ispf-server-2
      - ispf-server-3

volumes:
  cluster_pg_data:
