# Internal LB for deploy/docker-compose.vps-cluster.yml
# Split ingress: edge-api (:8081) for /api/ + /ws/; hmi-read (:8082) for /hmi/api/ + /hmi/ws/.
# io (:8083) + compute (:8084) are internal.

upstream ispf_edge_backend {
    ip_hash;
    server 127.0.0.1:8081 max_fails=2 fail_timeout=10s;
}

upstream ispf_hmi_backend {
    ip_hash;
    server 127.0.0.1:8082 max_fails=2 fail_timeout=10s;
}

server {
    listen 127.0.0.1:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 128m;

    server_tokens off;

    # Security headers — repeated in every location that sets its own add_header
    # (a location-level add_header drops the server-level ones).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; worker-src 'self' blob:; frame-src 'self' http: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location /api/ {
        proxy_pass http://ispf_edge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    location /hmi/api/ {
        proxy_pass http://ispf_hmi_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
    }

    location /ws/ {
        proxy_pass http://ispf_edge_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 86400;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /hmi/ws/ {
        proxy_pass http://ispf_hmi_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-ISPF-Role "";
        proxy_read_timeout 86400;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /actuator/ {
        proxy_pass http://ispf_edge_backend;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-ISPF-Role "";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; worker-src 'self' blob:; frame-src 'self' http: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; worker-src 'self' blob:; frame-src 'self' http: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
