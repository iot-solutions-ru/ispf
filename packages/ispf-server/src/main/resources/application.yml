spring:
  application:
    name: ispf-server
  config:
    import: optional:file:${ISPF_DATA_DIR:./data}/runtime-settings.properties
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${ISPF_DB_URL:jdbc:postgresql://localhost:5432/ispf?reWriteBatchedInserts=true}
    username: ${ISPF_DB_USER:ispf}
    password: ${ISPF_DB_PASSWORD:ispf}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${ISPF_DB_POOL_SIZE:30}
      minimum-idle: ${ISPF_DB_POOL_MIN_IDLE:8}
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: ${ISPF_HIBERNATE_JDBC_BATCH_SIZE:500}
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISPF_OAUTH_ISSUER:http://localhost:8180/realms/ispf}

server:
  port: ${ISPF_SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${ISPF_TOMCAT_THREADS_MAX:200}
      min-spare: ${ISPF_TOMCAT_THREADS_MIN:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
  otlp:
    metrics:
      export:
        enabled: ${ISPF_OTLP_METRICS_ENABLED:false}
        url: ${ISPF_OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
        step: ${ISPF_OTLP_METRICS_STEP:30s}
        resource-attributes:
          service.name: ${spring.application.name}
          deployment.environment: ${ISPF_ENVIRONMENT:local}
  tracing:
    enabled: ${ISPF_OTLP_TRACING_ENABLED:false}
    sampling:
      probability: ${ISPF_OTLP_TRACING_SAMPLING:0.1}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${ISPF_OTLP_TRACING_URL:http://localhost:4318/v1/traces}
  health:
    redis:
      enabled: ${ISPF_REDIS_ENABLED:false}

ispf:
  bootstrap:
    fixtures-enabled: ${ISPF_BOOTSTRAP_FIXTURES_ENABLED:false}
    fixture-profile: ${ISPF_BOOTSTRAP_FIXTURE_PROFILE:full}
  platform:
    name: IoT Solutions Platform Framework
    update:
      check-enabled: ${ISPF_UPDATE_CHECK_ENABLED:true}
      apply-enabled: ${ISPF_UPDATE_APPLY_ENABLED:false}
      github-owner: ${ISPF_UPDATE_GITHUB_OWNER:Michaael}
      github-repo: ${ISPF_UPDATE_GITHUB_REPO:IoT-Solutions-Platform}
      check-interval-ms: ${ISPF_UPDATE_CHECK_INTERVAL_MS:3600000}
      staging-dir: ${ISPF_UPDATE_STAGING_DIR:/opt/ispf/staging}
      apply-script: ${ISPF_UPDATE_APPLY_SCRIPT:/opt/ispf/bin/apply-platform-update.sh}
  mqtt:
    enabled: ${ISPF_MQTT_ENABLED:false}
    broker-url: ${ISPF_MQTT_BROKER:tcp://localhost:1883}
    client-id: ispf-server
  nats:
    enabled: ${ISPF_NATS_ENABLED:false}
    url: ${ISPF_NATS_URL:nats://localhost:4222}
    replica-events-enabled: ${ISPF_NATS_REPLICA_EVENTS:true}
    replica-id: ${ISPF_REPLICA_ID:}
    jet-stream-enabled: ${ISPF_NATS_JETSTREAM_ENABLED:false}
    jet-stream-stream-name: ${ISPF_NATS_JETSTREAM_STREAM:ispf-automation}
    jet-stream-max-age-hours: ${ISPF_NATS_JETSTREAM_MAX_AGE_HOURS:24}
    jet-stream-replica-consumer-prefix: ${ISPF_NATS_JETSTREAM_CONSUMER_PREFIX:ispf-replica-}
  cluster:
    enabled: ${ISPF_CLUSTER_ENABLED:false}
    driver-ownership-enabled: ${ISPF_CLUSTER_DRIVER_OWNERSHIP:true}
    driver-lock-ttl-seconds: ${ISPF_CLUSTER_DRIVER_LOCK_TTL_SECONDS:30}
    driver-lock-renew-seconds: ${ISPF_CLUSTER_DRIVER_LOCK_RENEW_SECONDS:10}
    driver-failover-scan-seconds: ${ISPF_CLUSTER_DRIVER_FAILOVER_SCAN_SECONDS:15}
    driver-lock-renew-ms: ${ISPF_CLUSTER_DRIVER_LOCK_RENEW_MS:10000}
    driver-failover-scan-ms: ${ISPF_CLUSTER_DRIVER_FAILOVER_SCAN_MS:15000}
    replica-heartbeat-seconds: ${ISPF_CLUSTER_REPLICA_HEARTBEAT_SECONDS:10}
    replica-stale-seconds: ${ISPF_CLUSTER_REPLICA_STALE_SECONDS:30}
    replica-heartbeat-ms: ${ISPF_CLUSTER_REPLICA_HEARTBEAT_MS:10000}
    live-variable-sync-enabled: ${ISPF_CLUSTER_LIVE_VARIABLE_SYNC:true}
    cluster-path-interest-enabled: ${ISPF_CLUSTER_PATH_INTEREST:true}
    live-variable-sync-coalesce-ms: ${ISPF_CLUSTER_LIVE_VARIABLE_SYNC_COALESCE_MS:500}
    live-variable-sync-coalesce-enabled: ${ISPF_CLUSTER_LIVE_VARIABLE_SYNC_COALESCE_ENABLED:true}
    replica-profile: ${ISPF_REPLICA_PROFILE:}
    replica-capabilities: ${ISPF_REPLICA_CAPABILITIES:}
    replica-role: ${ISPF_REPLICA_ROLE:all}
    job-consumer-enabled: ${ISPF_CLUSTER_JOB_CONSUMER_ENABLED:true}
    job-poll-ms: ${ISPF_CLUSTER_JOB_POLL_MS:2000}
    job-max-concurrent: ${ISPF_CLUSTER_JOB_MAX_CONCURRENT:2}
    job-elastic-enabled: ${ISPF_CLUSTER_JOB_ELASTIC:true}
    job-max-concurrent-min: ${ISPF_CLUSTER_JOB_MAX_CONCURRENT_MIN:1}
    job-max-concurrent-max: ${ISPF_CLUSTER_JOB_MAX_CONCURRENT_MAX:8}
    job-elastic-scale-up-threshold: ${ISPF_CLUSTER_JOB_ELASTIC_SCALE_UP:50}
    job-elastic-scale-down-steps: ${ISPF_CLUSTER_JOB_ELASTIC_SCALE_DOWN:6}
    job-elastic-scale-check-interval-ms: ${ISPF_CLUSTER_JOB_ELASTIC_SCALE_CHECK_MS:500}
    job-running-ttl-seconds: ${ISPF_CLUSTER_JOB_RUNNING_TTL_SECONDS:1800}
  federation:
    outbound-buffer:
      max-bytes: ${ISPF_FEDERATION_OUTBOUND_BUFFER_MAX_BYTES:2097152}
      drop-policy: ${ISPF_FEDERATION_OUTBOUND_BUFFER_DROP_POLICY:DROP_OLDEST}
    health:
      stale-minutes: ${ISPF_FEDERATION_HEALTH_STALE_MINUTES:15}
      monitor-enabled: ${ISPF_FEDERATION_HEALTH_MONITOR_ENABLED:true}
      monitor-interval-ms: ${ISPF_FEDERATION_HEALTH_MONITOR_INTERVAL_MS:60000}
  security:
    oidc-client-id: ${ISPF_OIDC_CLIENT_ID:ispf-web-console}
  websocket:
    send-threads: ${ISPF_WEBSOCKET_SEND_THREADS:2}
    send-elastic-enabled: ${ISPF_WEBSOCKET_SEND_ELASTIC:true}
    send-threads-min: ${ISPF_WEBSOCKET_SEND_THREADS_MIN:2}
    send-threads-max: ${ISPF_WEBSOCKET_SEND_THREADS_MAX:32}
    send-scale-up-queue-threshold: ${ISPF_WEBSOCKET_SEND_SCALE_UP:50}
    send-scale-down-steps: ${ISPF_WEBSOCKET_SEND_SCALE_DOWN:6}
    send-scale-check-interval-ms: ${ISPF_WEBSOCKET_SEND_SCALE_CHECK_MS:200}
  variable-history:
    enabled: ${ISPF_VARIABLE_HISTORY_ENABLED:true}
    min-interval-ms: ${ISPF_VARIABLE_HISTORY_MIN_INTERVAL_MS:5000}
    retention-days: ${ISPF_VARIABLE_HISTORY_RETENTION_DAYS:90}
    store: ${ISPF_VARIABLE_HISTORY_STORE:jdbc}
    dual-write-enabled: ${ISPF_VARIABLE_HISTORY_DUAL_WRITE_ENABLED:false}
    async-enabled: ${ISPF_VARIABLE_HISTORY_ASYNC_ENABLED:true}
    queue-capacity: ${ISPF_VARIABLE_HISTORY_QUEUE_CAPACITY:50000}
    batch-size: ${ISPF_VARIABLE_HISTORY_BATCH_SIZE:1000}
    flush-interval-ms: ${ISPF_VARIABLE_HISTORY_FLUSH_INTERVAL_MS:20}
    writer-threads: ${ISPF_VARIABLE_HISTORY_WRITER_THREADS:4}
    elastic-writer-enabled: ${ISPF_VARIABLE_HISTORY_ELASTIC_WRITER:true}
    writer-threads-min: ${ISPF_VARIABLE_HISTORY_WRITER_THREADS_MIN:4}
    writer-threads-max: ${ISPF_VARIABLE_HISTORY_WRITER_THREADS_MAX:32}
    elastic-scale-up-queue-threshold: ${ISPF_VARIABLE_HISTORY_ELASTIC_SCALE_UP_THRESHOLD:100}
    elastic-scale-down-steps: ${ISPF_VARIABLE_HISTORY_ELASTIC_SCALE_DOWN_STEPS:6}
    elastic-scale-check-interval-ms: ${ISPF_VARIABLE_HISTORY_ELASTIC_SCALE_CHECK_MS:200}
    overflow-coalesce-enabled: ${ISPF_VARIABLE_HISTORY_OVERFLOW_COALESCE:true}
    clickhouse:
      url: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_URL:http://localhost:8123}
      database: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_DATABASE:ispf}
      table: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_TABLE:variable_samples}
      username: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_USERNAME:default}
      password: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_PASSWORD:}
    cassandra:
      contact-points: ${ISPF_VARIABLE_HISTORY_CASSANDRA_CONTACT_POINTS:127.0.0.1}
      port: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PORT:9042}
      local-datacenter: ${ISPF_VARIABLE_HISTORY_CASSANDRA_LOCAL_DATACENTER:datacenter1}
      keyspace: ${ISPF_VARIABLE_HISTORY_CASSANDRA_KEYSPACE:ispf}
      table: ${ISPF_VARIABLE_HISTORY_CASSANDRA_TABLE:variable_samples}
      username: ${ISPF_VARIABLE_HISTORY_CASSANDRA_USERNAME:}
      password: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PASSWORD:}
      max-statements-per-partition-batch: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PARTITION_BATCH:200}
      min-parallel-partition-batches: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES_MIN:1}
      max-parallel-partition-batches: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES:32}
      elastic-parallel-batches-enabled: ${ISPF_VARIABLE_HISTORY_CASSANDRA_ELASTIC_PARALLEL:true}
      elastic-parallel-scale-up-threshold: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_SCALE_UP:32}
      elastic-parallel-scale-down-steps: ${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_SCALE_DOWN:6}
  runtime-telemetry:
    coalesce-ms: ${ISPF_RUNTIME_TELEMETRY_COALESCE_MS:250}
    coalesce-enabled: ${ISPF_RUNTIME_TELEMETRY_COALESCE_ENABLED:true}
    enabled: true
    coalesce-scheduler-threads: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_THREADS:4}
    coalesce-scheduler-elastic: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_ELASTIC:true}
    coalesce-scheduler-threads-min: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_THREADS_MIN:4}
    coalesce-scheduler-threads-max: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_THREADS_MAX:32}
    coalesce-scheduler-scale-up-threshold: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_SCALE_UP:50}
    coalesce-scheduler-scale-down-steps: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_SCALE_DOWN:6}
    coalesce-scheduler-scale-check-interval-ms: ${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_SCALE_CHECK_MS:200}
    ingress-queue-enabled: ${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_ENABLED:true}
    ingress-queue-capacity: ${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_CAPACITY:50000}
    ingress-elastic-workers: ${ISPF_RUNTIME_TELEMETRY_INGRESS_ELASTIC_WORKERS:true}
    ingress-worker-threads-min: ${ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MIN:4}
    ingress-worker-threads-max: ${ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MAX:32}
    ingress-scale-up-queue-threshold: ${ISPF_RUNTIME_TELEMETRY_INGRESS_SCALE_UP_THRESHOLD:100}
    ingress-scale-down-steps: ${ISPF_RUNTIME_TELEMETRY_INGRESS_SCALE_DOWN_STEPS:6}
    ingress-scale-check-interval-ms: ${ISPF_RUNTIME_TELEMETRY_INGRESS_SCALE_CHECK_MS:200}
    ingress-drain-batch-size: ${ISPF_RUNTIME_TELEMETRY_INGRESS_DRAIN_BATCH:512}
    ingress-queue-coalesce-enabled: ${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_COALESCE:true}
    fast-historian-path: ${ISPF_RUNTIME_TELEMETRY_FAST_HISTORIAN_PATH:true}
  binding:
    async-threads: ${ISPF_BINDING_ASYNC_THREADS:16}
    async-elastic-enabled: ${ISPF_BINDING_ASYNC_ELASTIC:true}
    async-threads-min: ${ISPF_BINDING_ASYNC_THREADS_MIN:4}
    async-threads-max: ${ISPF_BINDING_ASYNC_THREADS_MAX:32}
    async-scale-up-queue-threshold: ${ISPF_BINDING_ASYNC_SCALE_UP_THRESHOLD:50}
    async-scale-down-steps: ${ISPF_BINDING_ASYNC_SCALE_DOWN_STEPS:6}
    async-scale-check-interval-ms: ${ISPF_BINDING_ASYNC_SCALE_CHECK_MS:200}
    async-coalesce-enabled: ${ISPF_BINDING_ASYNC_COALESCE:true}
    audit:
      enabled: ${ISPF_BINDING_AUDIT_ENABLED:false}
      mode: ${ISPF_BINDING_AUDIT_MODE:changes}
      sample-rate: ${ISPF_BINDING_AUDIT_SAMPLE_RATE:1.0}
      async-enabled: ${ISPF_BINDING_AUDIT_ASYNC_ENABLED:true}
      queue-capacity: ${ISPF_BINDING_AUDIT_QUEUE_CAPACITY:10000}
      batch-size: ${ISPF_BINDING_AUDIT_BATCH_SIZE:100}
      flush-interval-ms: ${ISPF_BINDING_AUDIT_FLUSH_INTERVAL_MS:200}
      retention-days: ${ISPF_BINDING_AUDIT_RETENTION_DAYS:7}
      writer-threads: ${ISPF_BINDING_AUDIT_WRITER_THREADS:2}
      elastic-writer-enabled: ${ISPF_BINDING_AUDIT_ELASTIC_WRITER:true}
      writer-threads-min: ${ISPF_BINDING_AUDIT_WRITER_THREADS_MIN:2}
      writer-threads-max: ${ISPF_BINDING_AUDIT_WRITER_THREADS_MAX:16}
      elastic-scale-up-queue-threshold: ${ISPF_BINDING_AUDIT_ELASTIC_SCALE_UP:50}
      elastic-scale-down-steps: ${ISPF_BINDING_AUDIT_ELASTIC_SCALE_DOWN:6}
      elastic-scale-check-interval-ms: ${ISPF_BINDING_AUDIT_ELASTIC_SCALE_CHECK_MS:200}
  function:
    audit:
      enabled: ${ISPF_FUNCTION_AUDIT_ENABLED:false}
      mode: ${ISPF_FUNCTION_AUDIT_MODE:errors}
      sample-rate: ${ISPF_FUNCTION_AUDIT_SAMPLE_RATE:1.0}
      async-enabled: ${ISPF_FUNCTION_AUDIT_ASYNC_ENABLED:true}
      queue-capacity: ${ISPF_FUNCTION_AUDIT_QUEUE_CAPACITY:10000}
      batch-size: ${ISPF_FUNCTION_AUDIT_BATCH_SIZE:100}
      flush-interval-ms: ${ISPF_FUNCTION_AUDIT_FLUSH_INTERVAL_MS:200}
      retention-days: ${ISPF_FUNCTION_AUDIT_RETENTION_DAYS:30}
      writer-threads: ${ISPF_FUNCTION_AUDIT_WRITER_THREADS:2}
      elastic-writer-enabled: ${ISPF_FUNCTION_AUDIT_ELASTIC_WRITER:true}
      writer-threads-min: ${ISPF_FUNCTION_AUDIT_WRITER_THREADS_MIN:2}
      writer-threads-max: ${ISPF_FUNCTION_AUDIT_WRITER_THREADS_MAX:16}
      elastic-scale-up-queue-threshold: ${ISPF_FUNCTION_AUDIT_ELASTIC_SCALE_UP:50}
      elastic-scale-down-steps: ${ISPF_FUNCTION_AUDIT_ELASTIC_SCALE_DOWN:6}
      elastic-scale-check-interval-ms: ${ISPF_FUNCTION_AUDIT_ELASTIC_SCALE_CHECK_MS:200}
  mqtt-gateway:
    ingress-dispatch-threads: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_THREADS:8}
    ingress-dispatch-elastic-enabled: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_ELASTIC:true}
    ingress-dispatch-threads-min: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_THREADS_MIN:4}
    ingress-dispatch-threads-max: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_THREADS_MAX:32}
    ingress-dispatch-queue-capacity: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_QUEUE_CAPACITY:50000}
    ingress-dispatch-scale-up-queue-threshold: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_SCALE_UP:50}
    ingress-dispatch-scale-down-steps: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_SCALE_DOWN:6}
    ingress-dispatch-scale-check-interval-ms: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_SCALE_CHECK_MS:200}
    ingress-dispatch-coalesce-enabled: ${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_COALESCE:true}
    ingress-bypass-l3-queue: ${ISPF_MQTT_GATEWAY_INGRESS_BYPASS_L3:false}
  object-change:
    async-enabled: ${ISPF_OBJECT_CHANGE_ASYNC_ENABLED:true}
    queue-capacity: ${ISPF_OBJECT_CHANGE_QUEUE_CAPACITY:10000}
    worker-threads: ${ISPF_OBJECT_CHANGE_WORKER_THREADS:4}
    coalesce-telemetry-updates: ${ISPF_OBJECT_CHANGE_COALESCE_TELEMETRY:false}
    split-lanes-enabled: ${ISPF_OBJECT_CHANGE_SPLIT_LANES:true}
    telemetry-queue-capacity: ${ISPF_OBJECT_CHANGE_TELEMETRY_QUEUE_CAPACITY:10000}
    automation-queue-capacity: ${ISPF_OBJECT_CHANGE_AUTOMATION_QUEUE_CAPACITY:10000}
    telemetry-worker-threads: ${ISPF_OBJECT_CHANGE_TELEMETRY_WORKERS:2}
    automation-worker-threads: ${ISPF_OBJECT_CHANGE_AUTOMATION_WORKERS:4}
    elastic-workers-enabled: ${ISPF_OBJECT_CHANGE_ELASTIC_WORKERS:true}
    elastic-scale-up-queue-threshold: ${ISPF_OBJECT_CHANGE_ELASTIC_SCALE_UP_THRESHOLD:50}
    elastic-scale-down-steps: ${ISPF_OBJECT_CHANGE_ELASTIC_SCALE_DOWN_STEPS:6}
    elastic-scale-check-interval-ms: ${ISPF_OBJECT_CHANGE_ELASTIC_SCALE_CHECK_MS:500}
    worker-threads-min: ${ISPF_OBJECT_CHANGE_WORKER_THREADS_MIN:2}
    worker-threads-max: ${ISPF_OBJECT_CHANGE_WORKER_THREADS_MAX:16}
    telemetry-worker-threads-min: ${ISPF_OBJECT_CHANGE_TELEMETRY_WORKERS_MIN:1}
    telemetry-worker-threads-max: ${ISPF_OBJECT_CHANGE_TELEMETRY_WORKERS_MAX:8}
    automation-worker-threads-min: ${ISPF_OBJECT_CHANGE_AUTOMATION_WORKERS_MIN:2}
    automation-worker-threads-max: ${ISPF_OBJECT_CHANGE_AUTOMATION_WORKERS_MAX:16}
    coalesce-scheduler-threads: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_THREADS:2}
    coalesce-scheduler-elastic: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_ELASTIC:true}
    coalesce-scheduler-threads-min: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_THREADS_MIN:2}
    coalesce-scheduler-threads-max: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_THREADS_MAX:16}
    coalesce-scheduler-scale-up-threshold: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_SCALE_UP:20}
    coalesce-scheduler-scale-down-steps: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_SCALE_DOWN:6}
    coalesce-scheduler-scale-check-interval-ms: ${ISPF_OBJECT_CHANGE_COALESCE_SCHEDULER_SCALE_CHECK_MS:200}
    scale-scheduler-threads: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_THREADS:2}
    scale-scheduler-elastic: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_ELASTIC:true}
    scale-scheduler-threads-min: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_THREADS_MIN:1}
    scale-scheduler-threads-max: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_THREADS_MAX:8}
    scale-scheduler-scale-up-threshold: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_SCALE_UP:2}
    scale-scheduler-scale-down-steps: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_SCALE_DOWN:6}
    scale-scheduler-scale-check-interval-ms: ${ISPF_OBJECT_CHANGE_SCALE_SCHEDULER_SCALE_CHECK_MS:500}
  alert-rule:
    runtime:
      flush-enabled: ${ISPF_ALERT_RULE_RUNTIME_FLUSH_ENABLED:true}
      flush-interval-ms: ${ISPF_ALERT_RULE_RUNTIME_FLUSH_INTERVAL_MS:30000}
  event-journal:
    enabled: ${ISPF_EVENT_JOURNAL_ENABLED:false}
    async-enabled: ${ISPF_EVENT_JOURNAL_ASYNC_ENABLED:true}
    queue-capacity: ${ISPF_EVENT_JOURNAL_QUEUE_CAPACITY:10000}
    batch-size: ${ISPF_EVENT_JOURNAL_BATCH_SIZE:200}
    flush-interval-ms: ${ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS:100}
    writer-threads: ${ISPF_EVENT_JOURNAL_WRITER_THREADS:2}
    elastic-writer-enabled: ${ISPF_EVENT_JOURNAL_ELASTIC_WRITER:true}
    writer-threads-min: ${ISPF_EVENT_JOURNAL_WRITER_THREADS_MIN:2}
    writer-threads-max: ${ISPF_EVENT_JOURNAL_WRITER_THREADS_MAX:32}
    elastic-scale-up-queue-threshold: ${ISPF_EVENT_JOURNAL_ELASTIC_SCALE_UP_THRESHOLD:100}
    elastic-scale-down-steps: ${ISPF_EVENT_JOURNAL_ELASTIC_SCALE_DOWN_STEPS:6}
    elastic-scale-check-interval-ms: ${ISPF_EVENT_JOURNAL_ELASTIC_SCALE_CHECK_MS:200}
    recent-cache-size: ${ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE:2000}
    retention-days: ${ISPF_EVENT_JOURNAL_RETENTION_DAYS:90}
    store: ${ISPF_EVENT_JOURNAL_STORE:jdbc}
    cassandra-global-table-enabled: ${ISPF_EVENT_JOURNAL_CASSANDRA_GLOBAL_TABLE_ENABLED:false}
    cassandra-async-counter-update: ${ISPF_EVENT_JOURNAL_CASSANDRA_ASYNC_COUNTER_UPDATE:true}
    clickhouse:
      url: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_URL:http://localhost:8123}
      database: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_DATABASE:ispf}
      table: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_TABLE:event_history}
      username: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_USERNAME:default}
      password: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_PASSWORD:}
    cassandra:
      contact-points: ${ISPF_EVENT_JOURNAL_CASSANDRA_CONTACT_POINTS:127.0.0.1}
      port: ${ISPF_EVENT_JOURNAL_CASSANDRA_PORT:9042}
      local-datacenter: ${ISPF_EVENT_JOURNAL_CASSANDRA_LOCAL_DATACENTER:datacenter1}
      keyspace: ${ISPF_EVENT_JOURNAL_CASSANDRA_KEYSPACE:ispf}
      table: ${ISPF_EVENT_JOURNAL_CASSANDRA_TABLE:event_history}
      username: ${ISPF_EVENT_JOURNAL_CASSANDRA_USERNAME:}
      password: ${ISPF_EVENT_JOURNAL_CASSANDRA_PASSWORD:}
      max-statements-per-partition-batch: ${ISPF_EVENT_JOURNAL_CASSANDRA_PARTITION_BATCH:200}
      min-parallel-partition-batches: ${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES_MIN:1}
      max-parallel-partition-batches: ${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES:32}
      elastic-parallel-batches-enabled: ${ISPF_EVENT_JOURNAL_CASSANDRA_ELASTIC_PARALLEL:true}
      elastic-parallel-scale-up-threshold: ${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_SCALE_UP:32}
      elastic-parallel-scale-down-steps: ${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_SCALE_DOWN:6}
  platform-metrics-probe:
    # Boot-time env ignored for scheduling; enable via PUT /api/v1/platform/diagnostics/metrics-probe (Load diagnostics UI).
    enabled: ${ISPF_PLATFORM_METRICS_PROBE_ENABLED:false}
    interval-ms: ${ISPF_PLATFORM_METRICS_PROBE_INTERVAL_MS:5000}
  redis:
    enabled: ${ISPF_REDIS_ENABLED:false}
    host: ${ISPF_REDIS_HOST:localhost}
    port: ${ISPF_REDIS_PORT:6379}
    password: ${ISPF_REDIS_PASSWORD:}
    database: ${ISPF_REDIS_DATABASE:0}
    timeout: ${ISPF_REDIS_TIMEOUT:2s}
    correlator-windows-enabled: ${ISPF_REDIS_CORRELATOR_WINDOWS:false}
    cache:
      context-pack-ttl: ${ISPF_REDIS_CONTEXT_PACK_TTL:1h}
      platform-briefing-ttl: ${ISPF_REDIS_PLATFORM_BRIEFING_TTL:5m}
      object-acl-ttl: ${ISPF_REDIS_OBJECT_ACL_TTL:10m}
  driver:
    scheduler-threads: ${ISPF_DRIVER_SCHEDULER_THREADS:8}
    scheduler-threads-elastic-enabled: ${ISPF_DRIVER_SCHEDULER_THREADS_ELASTIC:true}
    scheduler-threads-min: ${ISPF_DRIVER_SCHEDULER_THREADS_MIN:4}
    scheduler-threads-max: ${ISPF_DRIVER_SCHEDULER_THREADS_MAX:32}
    scheduler-scale-up-threshold: ${ISPF_DRIVER_SCHEDULER_SCALE_UP:4}
    scheduler-scale-down-steps: ${ISPF_DRIVER_SCHEDULER_SCALE_DOWN:6}
    scheduler-scale-check-interval-ms: ${ISPF_DRIVER_SCHEDULER_SCALE_CHECK_MS:200}
    async-poll-enabled: ${ISPF_DRIVER_ASYNC_POLL_ENABLED:true}
    io-threads: ${ISPF_DRIVER_IO_THREADS:16}
    io-threads-elastic-enabled: ${ISPF_DRIVER_IO_THREADS_ELASTIC:true}
    io-threads-min: ${ISPF_DRIVER_IO_THREADS_MIN:4}
    io-threads-max: ${ISPF_DRIVER_IO_THREADS_MAX:32}
    io-scale-up-queue-threshold: ${ISPF_DRIVER_IO_SCALE_UP_THRESHOLD:50}
    io-scale-down-steps: ${ISPF_DRIVER_IO_SCALE_DOWN_STEPS:6}
    io-scale-check-interval-ms: ${ISPF_DRIVER_IO_SCALE_CHECK_MS:200}
    auto-start-on-boot: ${ISPF_DRIVER_AUTO_START_ON_BOOT:true}
    ingress-buffer-enabled: ${ISPF_DRIVER_INGRESS_BUFFER_ENABLED:true}
    ingress-buffer-threads: ${ISPF_DRIVER_INGRESS_BUFFER_THREADS:2}
    ingress-buffer-capacity: ${ISPF_DRIVER_INGRESS_BUFFER_CAPACITY:10000}
    ingress-buffer-elastic-enabled: ${ISPF_DRIVER_INGRESS_BUFFER_ELASTIC:true}
    ingress-buffer-threads-min: ${ISPF_DRIVER_INGRESS_BUFFER_THREADS_MIN:2}
    ingress-buffer-threads-max: ${ISPF_DRIVER_INGRESS_BUFFER_THREADS_MAX:32}
    ingress-buffer-scale-up-queue-threshold: ${ISPF_DRIVER_INGRESS_BUFFER_SCALE_UP_THRESHOLD:100}
    ingress-buffer-scale-down-steps: ${ISPF_DRIVER_INGRESS_BUFFER_SCALE_DOWN_STEPS:6}
    ingress-buffer-scale-check-interval-ms: ${ISPF_DRIVER_INGRESS_BUFFER_SCALE_CHECK_MS:200}
    mqtt-callback-threads: ${ISPF_DRIVER_MQTT_CALLBACK_THREADS:4}
    mqtt-callback-queue-capacity: ${ISPF_DRIVER_MQTT_CALLBACK_QUEUE_CAPACITY:10000}
    mqtt-callback-elastic-enabled: ${ISPF_DRIVER_MQTT_CALLBACK_ELASTIC:true}
    mqtt-callback-threads-min: ${ISPF_DRIVER_MQTT_CALLBACK_THREADS_MIN:4}
    mqtt-callback-threads-max: ${ISPF_DRIVER_MQTT_CALLBACK_THREADS_MAX:32}
    mqtt-callback-scale-up-queue-threshold: ${ISPF_DRIVER_MQTT_CALLBACK_SCALE_UP_THRESHOLD:100}
    mqtt-callback-scale-down-steps: ${ISPF_DRIVER_MQTT_CALLBACK_SCALE_DOWN_STEPS:6}
    mqtt-callback-scale-check-interval-ms: ${ISPF_DRIVER_MQTT_CALLBACK_SCALE_CHECK_MS:200}
    mqtt-ingress-coalesce-enabled: ${ISPF_DRIVER_MQTT_INGRESS_COALESCE:true}
    packs-dir: ${ISPF_DRIVER_PACKS_DIR:./data/drivers}
  license:
    data-dir: ${ISPF_DATA_DIR:./data}
    public-key-pem: ${ISPF_LICENSE_PUBLIC_KEY_PEM:}
    enforce: ${ISPF_LICENSE_ENFORCE:false}
    require-signed-bundles: ${ISPF_LICENSE_REQUIRE_SIGNED_BUNDLES:false}
  ai:
    enabled: ${ISPF_AI_ENABLED:true}
    provider: ${ISPF_AI_PROVIDER:noop}
    base-url: ${ISPF_AI_BASE_URL:}
    model: ${ISPF_AI_MODEL:gpt-4o-mini}
    api-key: ${ISPF_AI_API_KEY:}
    api-key-env: ${ISPF_AI_API_KEY_ENV:OPENAI_API_KEY}
    timeout-seconds: ${ISPF_AI_TIMEOUT_SECONDS:600}
    max-tokens: ${ISPF_AI_MAX_TOKENS:65536}
    agent-max-tokens: ${ISPF_AI_AGENT_MAX_TOKENS:131072}
    temperature: ${ISPF_AI_TEMPERATURE:0}
    context-pack-classpath: classpath:ai/context-pack.json
    agent-max-steps: ${ISPF_AI_AGENT_MAX_STEPS:256}
    agent-parse-retries: ${ISPF_AI_AGENT_PARSE_RETRIES:5}
    agent-max-text-inject-chars: ${ISPF_AI_AGENT_MAX_TEXT_INJECT_CHARS:524288}
    agent-max-attachment-bytes: ${ISPF_AI_AGENT_MAX_ATTACHMENT_BYTES:33554432}
    agent-session-ttl-hours: ${ISPF_AI_AGENT_SESSION_TTL_HOURS:24}
    agent-max-history-turns: ${ISPF_AI_AGENT_MAX_HISTORY_TURNS:128}
    agent-max-concurrent-turns-per-user: ${ISPF_AI_AGENT_MAX_CONCURRENT_TURNS:2}
    agent-max-turns-per-hour-per-user: ${ISPF_AI_AGENT_MAX_TURNS_PER_HOUR:120}
    agent-eviction-interval-ms: ${ISPF_AI_AGENT_EVICTION_INTERVAL_MS:3600000}
    agent-disable-thinking: ${ISPF_AI_AGENT_DISABLE_THINKING:true}
    agent-require-approval-for-mutate: ${ISPF_AI_AGENT_REQUIRE_APPROVAL_FOR_MUTATE:true}
  reports:
    yarg:
      libre-office:
        path: ${ISPF_REPORTS_LIBREOFFICE_PATH:}
        timeout-seconds: ${ISPF_REPORTS_LIBREOFFICE_TIMEOUT:120}
        display-device-available: false

logging:
  level:
    com.ispf: INFO
