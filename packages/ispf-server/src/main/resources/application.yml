spring:
  application:
    name: ispf-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${ISPF_DB_URL:jdbc:postgresql://localhost:5432/ispf}
    username: ${ISPF_DB_USER:ispf}
    password: ${ISPF_DB_PASSWORD:ispf}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${ISPF_DB_POOL_SIZE:30}
      minimum-idle: ${ISPF_DB_POOL_MIN_IDLE:8}
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISPF_OAUTH_ISSUER:http://localhost:8180/realms/ispf}

server:
  port: ${ISPF_SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${ISPF_TOMCAT_THREADS_MAX:200}
      min-spare: ${ISPF_TOMCAT_THREADS_MIN:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: ${ISPF_REDIS_ENABLED:false}

ispf:
  platform:
    name: IoT Solutions Platform Framework
    update:
      check-enabled: ${ISPF_UPDATE_CHECK_ENABLED:true}
      apply-enabled: ${ISPF_UPDATE_APPLY_ENABLED:false}
      github-owner: ${ISPF_UPDATE_GITHUB_OWNER:Michaael}
      github-repo: ${ISPF_UPDATE_GITHUB_REPO:IoT-Solutions-Platform}
      check-interval-ms: ${ISPF_UPDATE_CHECK_INTERVAL_MS:3600000}
      staging-dir: ${ISPF_UPDATE_STAGING_DIR:/opt/ispf/staging}
      apply-script: ${ISPF_UPDATE_APPLY_SCRIPT:/opt/ispf/bin/apply-platform-update.sh}
  mqtt:
    enabled: ${ISPF_MQTT_ENABLED:false}
    broker-url: ${ISPF_MQTT_BROKER:tcp://localhost:1883}
    client-id: ispf-server
  nats:
    enabled: ${ISPF_NATS_ENABLED:false}
    url: ${ISPF_NATS_URL:nats://localhost:4222}
    replica-events-enabled: ${ISPF_NATS_REPLICA_EVENTS:true}
    replica-id: ${ISPF_REPLICA_ID:}
  security:
    oidc-client-id: ${ISPF_OIDC_CLIENT_ID:ispf-web-console}
  variable-history:
    enabled: true
    min-interval-ms: 5000
    retention-days: 90
  runtime-telemetry:
    coalesce-ms: 1000
    enabled: true
  object-change:
    async-enabled: ${ISPF_OBJECT_CHANGE_ASYNC_ENABLED:true}
    queue-capacity: ${ISPF_OBJECT_CHANGE_QUEUE_CAPACITY:10000}
    worker-threads: ${ISPF_OBJECT_CHANGE_WORKER_THREADS:4}
    coalesce-telemetry-updates: ${ISPF_OBJECT_CHANGE_COALESCE_TELEMETRY:true}
    split-lanes-enabled: ${ISPF_OBJECT_CHANGE_SPLIT_LANES:true}
    telemetry-queue-capacity: ${ISPF_OBJECT_CHANGE_TELEMETRY_QUEUE_CAPACITY:10000}
    automation-queue-capacity: ${ISPF_OBJECT_CHANGE_AUTOMATION_QUEUE_CAPACITY:10000}
    telemetry-worker-threads: ${ISPF_OBJECT_CHANGE_TELEMETRY_WORKERS:2}
    automation-worker-threads: ${ISPF_OBJECT_CHANGE_AUTOMATION_WORKERS:4}
  event-journal:
    async-enabled: ${ISPF_EVENT_JOURNAL_ASYNC_ENABLED:true}
    queue-capacity: ${ISPF_EVENT_JOURNAL_QUEUE_CAPACITY:10000}
    batch-size: ${ISPF_EVENT_JOURNAL_BATCH_SIZE:100}
    flush-interval-ms: ${ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS:250}
    recent-cache-size: ${ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE:500}
  platform-metrics-probe:
    enabled: ${ISPF_PLATFORM_METRICS_PROBE_ENABLED:false}
    interval-ms: ${ISPF_PLATFORM_METRICS_PROBE_INTERVAL_MS:5000}
  redis:
    enabled: ${ISPF_REDIS_ENABLED:false}
    host: ${ISPF_REDIS_HOST:localhost}
    port: ${ISPF_REDIS_PORT:6379}
    password: ${ISPF_REDIS_PASSWORD:}
    database: ${ISPF_REDIS_DATABASE:0}
    timeout: ${ISPF_REDIS_TIMEOUT:2s}
    cache:
      context-pack-ttl: ${ISPF_REDIS_CONTEXT_PACK_TTL:1h}
      platform-briefing-ttl: ${ISPF_REDIS_PLATFORM_BRIEFING_TTL:5m}
      object-acl-ttl: ${ISPF_REDIS_OBJECT_ACL_TTL:10m}
  driver:
    scheduler-threads: ${ISPF_DRIVER_SCHEDULER_THREADS:8}
    packs-dir: ${ISPF_DRIVER_PACKS_DIR:./data/drivers}
  license:
    data-dir: ${ISPF_DATA_DIR:./data}
    public-key-pem: ${ISPF_LICENSE_PUBLIC_KEY_PEM:}
    enforce: ${ISPF_LICENSE_ENFORCE:false}
  ai:
    enabled: ${ISPF_AI_ENABLED:true}
    provider: ${ISPF_AI_PROVIDER:noop}
    base-url: ${ISPF_AI_BASE_URL:}
    model: ${ISPF_AI_MODEL:gpt-4o-mini}
    api-key: ${ISPF_AI_API_KEY:}
    api-key-env: ${ISPF_AI_API_KEY_ENV:OPENAI_API_KEY}
    timeout-seconds: ${ISPF_AI_TIMEOUT_SECONDS:60}
    max-tokens: ${ISPF_AI_MAX_TOKENS:16384}
    temperature: ${ISPF_AI_TEMPERATURE:0.2}
    context-pack-classpath: classpath:ai/context-pack.json
    agent-max-steps: ${ISPF_AI_AGENT_MAX_STEPS:96}
    agent-session-ttl-hours: ${ISPF_AI_AGENT_SESSION_TTL_HOURS:24}
    agent-max-history-turns: ${ISPF_AI_AGENT_MAX_HISTORY_TURNS:50}
    agent-eviction-interval-ms: ${ISPF_AI_AGENT_EVICTION_INTERVAL_MS:3600000}
    agent-disable-thinking: ${ISPF_AI_AGENT_DISABLE_THINKING:true}
  reports:
    yarg:
      libre-office:
        path: ${ISPF_REPORTS_LIBREOFFICE_PATH:}
        timeout-seconds: ${ISPF_REPORTS_LIBREOFFICE_TIMEOUT:120}
        display-device-available: false

logging:
  level:
    com.ispf: INFO
