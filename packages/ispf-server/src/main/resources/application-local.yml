spring:
  datasource:
    url: jdbc:h2:file:./data/ispf-local;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  neo4j:
    # graph-db driver on classpath enables Neo4j auto-config; no Neo4j in local dev
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

management:
  health:
    neo4j:
      enabled: false

ispf:
  security:
    rbac-enabled: true
    token-auth-enabled: true
    local-default-role: ""
  mqtt:
    enabled: false
  nats:
    enabled: false
  ai:
    provider: openai-compatible
    base-url: http://84.42.21.226:8000/v1
    model: unsloth/Qwen3.6-35B-A3B-NVFP4
    api-key: ${ISPF_AI_API_KEY:}
    timeout-seconds: 180
    max-tokens: 262144
    temperature: 0.2

logging:
  level:
    com.ispf: DEBUG
