spring:
  datasource:
    # DATABASE_TO_LOWER matches application-test.yml — required for H2 2.4 + MODE=PostgreSQL
    # so unquoted identifiers resolve to Flyway's lowercase tables (platform_users, …).
    url: jdbc:h2:file:${ISPF_DATA_DIR:./data}/ispf-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  neo4j:
    # graph-db driver on classpath enables Neo4j auto-config; no Neo4j in local dev
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

management:
  health:
    neo4j:
      enabled: false

ispf:
  security:
    rbac-enabled: true
    token-auth-enabled: true
    local-default-role: ""
  license:
    enforce: false
    require-signed-bundles: false
  websocket:
    allowed-origin-patterns: "*"
  mqtt:
    enabled: false
  nats:
    enabled: false
  ai:
    provider: openai-compatible
    base-url: http://lab-edge.example.invalid:8000/v1
    model: unsloth/Qwen3.6-35B-A3B-NVFP4
    api-key: ${ISPF_AI_API_KEY:}
    timeout-seconds: 180
    max-tokens: 16384
    temperature: 0.2

logging:
  level:
    com.ispf: DEBUG
