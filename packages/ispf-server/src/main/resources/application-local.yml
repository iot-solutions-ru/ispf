spring:
  datasource:
    url: jdbc:h2:file:./data/ispf-local;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  neo4j:
    # graph-db driver on classpath enables Neo4j auto-config; no Neo4j in local dev
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

management:
  health:
    neo4j:
      enabled: false

ispf:
  security:
    rbac-enabled: true
    token-auth-enabled: true
    local-default-role: ""
  mqtt:
    enabled: false
  nats:
    enabled: false

logging:
  level:
    com.ispf: DEBUG
