spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ispf

ispf:
  ai:
    agent-require-approval-for-mutate: false
  license:
    # Dev labs often load unsigned example packs; prod profile tightens this.
    enforce: ${ISPF_LICENSE_ENFORCE:false}
    require-signed-bundles: ${ISPF_LICENSE_REQUIRE_SIGNED_BUNDLES:false}
  websocket:
    allowed-origin-patterns: ${ISPF_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:*}
  mqtt:
    enabled: true
    broker-url: tcp://localhost:1883
  nats:
    enabled: true
    url: nats://localhost:4222
    replica-events-enabled: true

logging:
  level:
    com.ispf: DEBUG
