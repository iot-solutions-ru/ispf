spring:
  datasource:
    url: jdbc:h2:mem:ispf-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

ispf:
  security:
    rbac-enabled: false
    secrets-key: test-secret-key-for-federation-phase7
  mqtt:
    enabled: false
  nats:
    enabled: false
  variable-history:
    min-interval-ms: 0
  platform:
    update:
      check-enabled: false
      apply-enabled: false
