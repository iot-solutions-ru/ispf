spring:
  datasource:
    # Unique DB per Spring context — avoids cross-test pollution when @TestPropertySource spins up extra contexts.
    url: jdbc:h2:mem:ispf-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      # EventFireLoadTest uses 150 concurrent HTTP threads each opening REQUIRES_NEW transactions.
      maximum-pool-size: 200
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

ispf:
  bootstrap:
    fixtures-enabled: true
    mes-catalog-enabled: false
  security:
    rbac-enabled: false
    local-role-header-enabled: true
    secrets-key: test-secret-key-for-federation-phase7
  mqtt:
    enabled: false
  nats:
    enabled: false
  variable-history:
    min-interval-ms: 0
    async-enabled: false
  runtime-telemetry:
    enabled: false
  object-change:
    async-enabled: false
    demand-driven-publication: false
  event-journal:
    async-enabled: false
  redis:
    enabled: false
  platform:
    update:
      check-enabled: false
      apply-enabled: false
  license:
    data-dir: ${java.io.tmpdir}/ispf-test-${random.uuid}
    enforce: false
  agent:
    store-forward:
      persist-to-disk: false
  driver:
    packs-dir: ${ISPF_DRIVER_PACKS_DIR:../../build/driver-packs}

management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    enabled: false
