spring:
  datasource:
    # Unique DB per Spring context — avoids cross-test pollution when @TestPropertySource spins up extra contexts.
    url: jdbc:h2:mem:ispf-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      # EventFireLoadTest uses 150 concurrent HTTP threads each opening REQUIRES_NEW transactions.
      maximum-pool-size: 200
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://example.invalid/realms/ispf

ispf:
  security:
    rbac-enabled: false
    secrets-key: test-secret-key-for-federation-phase7
  mqtt:
    enabled: false
  nats:
    enabled: false
  variable-history:
    min-interval-ms: 0
  runtime-telemetry:
    enabled: false
  object-change:
    async-enabled: false
  event-journal:
    async-enabled: false
  redis:
    enabled: false
  platform:
    update:
      check-enabled: false
      apply-enabled: false
  license:
    data-dir: ${java.io.tmpdir}/ispf-test-license
    enforce: false

management:
  otlp:
    metrics:
      export:
        enabled: false
