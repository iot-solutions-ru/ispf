name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 0.9.167). Creates tag vVERSION if missing."
        required: true
        type: string
      publish_github_release:
        description: "Also create a GitHub Release with portable zip"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version and image name
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          # GHCR repository names must be lowercase
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/ispf-server"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build AI context pack
        run: |
          ISPF_VERSION="${{ steps.ver.outputs.version }}" python tools/ai-pack/build.py

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Build web console
        working-directory: apps/web-console
        run: |
          npm ci
          npm run build

      - name: Build all-in-one server jar
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ./gradlew :packages:ispf-server:bootJar -x test --no-daemon \
            -Pversion="$VERSION" \
            -PembedWebConsole=true
          cp "$(ls packages/ispf-server/build/libs/ispf-server-*.jar | grep -v plain | head -1)" ispf-server.jar

      - name: Package web console (nginx / VPS split deploy)
        run: |
          cd apps/web-console/dist
          zip -r ../web-console.zip .

      - name: Package portable zip (jar + start.bat + start.sh)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PORTABLE_DIR="ispf-${VERSION}"
          mkdir -p "$PORTABLE_DIR"
          cp ispf-server.jar "$PORTABLE_DIR/ispf-server.jar"
          cp scripts/start.bat scripts/start.sh "$PORTABLE_DIR/"
          chmod +x "$PORTABLE_DIR/start.sh"
          {
            echo "ISPF portable (Windows / Linux / macOS)"
            echo ""
            echo "Requirements: JDK 25+ on PATH"
            echo ""
            echo "Windows:  double-click start.bat"
            echo "Linux/macOS:  chmod +x start.sh && ./start.sh"
            echo ""
            echo "Then open http://localhost:8080"
            echo "Login: admin / admin"
            echo ""
            echo "Database: embedded H2 (no PostgreSQL)."
            echo "  Created on first start: data/ispf-local.mv.db"
            echo "  To reset: stop ISPF and delete the data/ folder."
          } > "$PORTABLE_DIR/README.txt"
          zip -r "ispf-${VERSION}-portable.zip" "$PORTABLE_DIR"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push GHCR package
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=ISPF
            org.opencontainers.image.description=Open-source industrial IoT / SCADA — all-in-one server + web console
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG="ispf-server"
          # OCI label org.opencontainers.image.source links the package to this repo.
          # Visibility often requires a one-time UI confirm for the first public package.
          if gh api --method GET "/user/packages/container/${PKG}" >/dev/null 2>&1; then
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PKG}/visibility" \
              -f visibility=public \
              && echo "Package visibility set to public" \
              || echo "WARN: set package visibility to Public in GitHub UI (Package settings)"
          fi

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_github_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          IMAGE="${{ steps.ver.outputs.image }}"
          {
            echo "## Portable (recommended)"
            echo ""
            echo "Download **ispf-${VERSION}-portable.zip**, unzip, then:"
            echo ""
            echo "- Windows: double-click \`start.bat\`"
            echo "- Linux / macOS: \`./start.sh\`"
            echo ""
            echo "Open http://localhost:8080 — login \`admin\` / \`admin\`. Requires JDK 25+."
            echo ""
            echo "## Container (GitHub Packages)"
            echo ""
            echo '```bash'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo "docker run --rm -p 8080:8080 ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "Package: https://github.com/${{ github.repository_owner }}?tab=packages&repo_name=${{ github.event.repository.name }}"
            echo ""
            echo "## Individual assets"
            echo ""
            echo "- \`ispf-server.jar\` — all-in-one server + UI"
            echo "- \`start.bat\` / \`start.sh\` — launchers (same as inside the portable zip)"
            echo "- \`web-console.zip\` — UI only for nginx / VPS split deploy"
          } > /tmp/release-notes.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "ispf-${VERSION}-portable.zip" \
              ispf-server.jar \
              scripts/start.bat \
              scripts/start.sh \
              apps/web-console/web-console.zip \
              --clobber
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" \
              --target "${{ github.sha }}" \
              --title "ISPF $TAG" \
              --notes-file /tmp/release-notes.md \
              "ispf-${VERSION}-portable.zip" \
              ispf-server.jar \
              scripts/start.bat \
              scripts/start.sh \
              apps/web-console/web-console.zip
          fi
