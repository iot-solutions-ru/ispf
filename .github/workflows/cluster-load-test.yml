name: Cluster load test gate

on:
  workflow_dispatch:
    inputs:
      scale_factor_floor:
        description: "Minimum throughput ratio (3 replicas / 1 replica)"
        required: false
        default: "1.8"
      run_compose_gate:
        description: "Run Docker compose smoke + scale gate (slow)"
        type: boolean
        default: true
  schedule:
    # Weekly Sunday 04:00 UTC — JDBC ownership + JVM baseline (BL-137/138)
    - cron: "0 4 * * 0"

jobs:
  cluster-ownership-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Driver ownership + failover tests
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.driver.DriverOwnershipServiceTest \
            --tests com.ispf.server.driver.ClusterFailoverIntegrationTest \
            --no-daemon \
            2>&1 | tee cluster-ownership.log

      - name: Upload cluster test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-ownership-${{ github.run_id }}
          path: cluster-ownership.log
          retention-days: 14

  jvm-baseline-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Single-node API throughput baseline
        env:
          ISPF_LOAD_P99_CEILING_MS: 5000
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.api.ListDevicesLoadTest \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            2>&1 | tee cluster-baseline-list-devices.log

      - name: Upload baseline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-baseline-${{ github.run_id }}
          path: cluster-baseline-list-devices.log
          retention-days: 14

  cluster-compose-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.run_compose_gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Build ispf-server JAR
        run: ./gradlew :packages:ispf-server:bootJar -x test --no-daemon

      - name: Build web-console
        run: |
          cd apps/web-console
          npm ci
          npm run build

      - name: Stage cluster artifacts
        run: |
          mkdir -p deploy/staging
          JAR="$(ls -1 packages/ispf-server/build/libs/ispf-server-*.jar | grep -v plain | head -1)"
          cp "$JAR" deploy/staging/ispf-server.jar
          chmod +x deploy/cluster-smoke-test.sh deploy/cluster-quickstart.sh

      - name: Start cluster stack
        run: |
          docker compose -f deploy/docker-compose.cluster.yml up -d
          sleep 20

      - name: Cluster smoke (round-robin, failover, driver reclaim)
        run: bash deploy/cluster-smoke-test.sh

      - name: Scale-out throughput gate
        run: |
          python3 deploy/cluster-scale-load-test.py \
            --scale-factor-floor "${{ inputs.scale_factor_floor || '1.8' }}"

      - name: Upload scale report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-scale-${{ github.run_id }}
          path: deploy/cluster-scale-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down cluster stack
        if: always()
        run: docker compose -f deploy/docker-compose.cluster.yml down -v
