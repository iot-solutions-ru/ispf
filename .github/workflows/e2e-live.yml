name: E2E live

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ISPF base URL (UI + API)"
        required: false
        default: "https://ispf.example.invalid"
  schedule:
    # Monday 06:00 UTC — skipped automatically when secrets are missing
    - cron: "0 6 * * 1"

jobs:
  # secrets.* is not allowed in job-level `if`; probe via env instead
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          if [ -n "$E2E_USERNAME" ] && [ -n "$E2E_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "E2E secrets not configured; live smoke will be skipped."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  live-smoke:
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Golden path API smoke (alarm → journal → ack)
        env:
          BASE_URL: ${{ inputs.base_url || 'https://ispf.example.invalid' }}
          ISPF_USERNAME: ${{ secrets.E2E_USERNAME }}
          ISPF_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: python3 deploy/tools/golden-path-alarm-smoke.py

      - name: Live Playwright smoke
        working-directory: apps/web-console
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://ispf.example.invalid' }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e
