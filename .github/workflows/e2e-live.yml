name: E2E live

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ISPF base URL (UI + API)"
        required: false
        default: "https://ispf.iot-solutions.ru"
  schedule:
    # Monday 06:00 UTC — skipped automatically when secrets are missing
    - cron: "0 6 * * 1"

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.E2E_USERNAME != '' && secrets.E2E_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Live Playwright smoke
        working-directory: apps/web-console
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'https://ispf.iot-solutions.ru' }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e
