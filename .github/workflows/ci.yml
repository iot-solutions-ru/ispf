name: CI (pr-fast)

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      drivers: ${{ steps.filter.outputs.drivers }}
      web_console: ${{ steps.filter.outputs.web_console }}
      tools: ${{ steps.filter.outputs.tools }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'packages/**'
              - '!packages/ispf-driver-*/**'
              - 'packages/ispf-driver-api/**'
              - 'buildSrc/**'
              - 'gradle/**'
              - '!gradle/driver-packs.json'
              - 'gradlew'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'tools/ai-pack/**'
              - 'tools/license-audit/**'
              - 'tools/agent-regression/**'
              - 'examples/**'
            drivers:
              - 'packages/ispf-driver-*/**'
              - 'packages/ispf-driver-api/**'
              - 'gradle/driver-packs.json'
              - 'buildSrc/src/main/kotlin/com/ispf/build/**'
              - 'buildSrc/src/main/resources/META-INF/gradle-plugins/ispf-driver-pack.properties'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
            web_console:
              - 'apps/web-console/**'
              - 'tools/symbol-pack-isa/**'
            tools:
              - 'tools/ai-pack/**'
              - 'tools/license-audit/**'
              - 'tools/agent-regression/**'

  driver-packs:
    needs: changes
    if: needs.changes.outputs.drivers == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Restore dev driver packs
        uses: actions/cache/restore@v6
        id: driver-packs-cache
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}
          restore-keys: |
            driver-packs-dev-

      - name: Test and sync dev driver packs
        env:
          ISPF_DRIVER_PACKS_PREBUILT: ${{ steps.driver-packs-cache.outputs.cache-hit }}
        run: >
          ./gradlew
          testDevDriverPacks
          syncDevDriverPacks
          --no-daemon
          -Dorg.gradle.workers.max=1
          -Dispf.driver.packs=dev

      - name: Save dev driver packs
        if: steps.driver-packs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build AI context pack
        run: ISPF_VERSION=0.9.2 python tools/ai-pack/build.py

      - name: License compliance audit
        run: node tools/license-audit/check-all.mjs

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Restore dev driver packs
        uses: actions/cache/restore@v6
        id: driver-packs-cache
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}
          restore-keys: |
            driver-packs-dev-

      - name: Test core platform modules (skip load)
        env:
          ISPF_DRIVER_PACKS_PREBUILT: ${{ steps.driver-packs-cache.outputs.cache-hit }}
        run: >
          ./gradlew
          testPrFast
          --no-daemon
          -Dorg.gradle.workers.max=1
          -Dispf.test.skipLoad=true
          -Dispf.test.skipFederation=true
          -Dispf.driver.packs=dev

      - name: Save dev driver packs
        if: steps.driver-packs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}

  web-console:
    needs: changes
    if: needs.changes.outputs.web_console == 'true' || needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: License compliance audit
        run: node tools/license-audit/check-all.mjs

      - name: Build ISA P&ID symbol pack
        if: needs.changes.outputs.web_console == 'true'
        run: |
          cd tools/symbol-pack-isa
          npm ci
          npm test
          npm run build

      - name: Unit tests, i18n gate, build
        working-directory: apps/web-console
        run: |
          npm ci
          npm test
          npm run i18n:check
          npm run build
          test -f dist/legal/LICENSE
          test -f dist/legal/THIRD_PARTY_NOTICES.md

  marketplace-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate marketplace-catalog bundles (BL-183)
        run: node tools/marketplace-catalog/validate-catalog.mjs

  helm-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.4

      - name: Helm lint + template smoke (BL-186)
        run: bash deploy/helm/ispf/validate.sh

  agent-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate agent-regression scenario schemas (BL-178)
        run: node tools/agent-regression/validate-scenarios.mjs

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Restore dev driver packs
        uses: actions/cache/restore@v6
        id: driver-packs-cache
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}
          restore-keys: |
            driver-packs-dev-

      - name: AgentRegressionCiTest (Java schema gate)
        env:
          ISPF_DRIVER_PACKS_PREBUILT: ${{ steps.driver-packs-cache.outputs.cache-hit }}
        run: >
          ./gradlew
          :packages:ispf-ai-agent:test
          --tests com.ispf.server.ai.agent.AgentRegressionCiTest
          --no-daemon
          -Dorg.gradle.workers.max=1
          -Dispf.test.skipLoad=true
          -Dispf.test.skipFederation=true
          -Dispf.driver.packs=dev

      - name: Save dev driver packs
        if: steps.driver-packs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: build/driver-packs
          key: driver-packs-dev-${{ hashFiles('gradle/driver-packs.json', 'build.gradle.kts', 'buildSrc/**', 'packages/ispf-driver-virtual/**', 'packages/ispf-driver-mqtt/**', 'packages/ispf-driver-modbus/**', 'packages/ispf-driver-http/**', 'packages/ispf-driver-cwmp/**', 'packages/ispf-driver-flexible/**', 'packages/ispf-driver-gps-tracker/**', 'packages/ispf-driver-application/**') }}

  pr-fast-ok:
    needs: [changes, backend, driver-packs, web-console, agent-regression, marketplace-catalog, helm-chart]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require successful pr-fast jobs
        run: |
          echo "backend=${{ needs.backend.result }}"
          echo "driver-packs=${{ needs.driver-packs.result }}"
          echo "web-console=${{ needs.web-console.result }}"
          echo "agent-regression=${{ needs.agent-regression.result }}"
          echo "marketplace-catalog=${{ needs.marketplace-catalog.result }}"
          echo "helm-chart=${{ needs.helm-chart.result }}"
          if [[ "${{ needs.backend.result }}" == "failure"
             || "${{ needs.driver-packs.result }}" == "failure"
             || "${{ needs.web-console.result }}" == "failure"
             || "${{ needs.agent-regression.result }}" == "failure"
             || "${{ needs.marketplace-catalog.result }}" == "failure"
             || "${{ needs.helm-chart.result }}" == "failure" ]]; then
            echo "pr-fast failed"
            exit 1
          fi
          if [[ "${{ needs.backend.result }}" == "cancelled"
             || "${{ needs.driver-packs.result }}" == "cancelled"
             || "${{ needs.web-console.result }}" == "cancelled"
             || "${{ needs.agent-regression.result }}" == "cancelled"
             || "${{ needs.marketplace-catalog.result }}" == "cancelled"
             || "${{ needs.helm-chart.result }}" == "cancelled" ]]; then
            exit 1
          fi
          echo "pr-fast passed (skipped jobs are OK for path-only changes)"
