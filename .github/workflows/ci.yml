name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Test core platform modules
        run: >
          ./gradlew
          :packages:ispf-core:test
          :packages:ispf-expression:test
          :packages:ispf-plugin-model:test
          :packages:ispf-plugin-workflow:test
          :packages:ispf-server:test
          --no-daemon
          -Dorg.gradle.workers.max=2

  web-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install, test, and build
        working-directory: apps/web-console
        run: |
          npm ci
          npm test
          npm run build
