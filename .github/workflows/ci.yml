name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build AI context pack
        run: ISPF_VERSION=0.9.2 python tools/ai-pack/build.py

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Test core platform modules
        run: >
          ./gradlew
          :packages:ispf-core:test
          :packages:ispf-expression:test
          :packages:ispf-plugin-model:test
          :packages:ispf-plugin-workflow:test
          :packages:ispf-server:test
          --no-daemon
          -Dorg.gradle.workers.max=1

      - name: Scale gate — list_devices p99 baseline
        run: >
          ./gradlew
          :packages:ispf-server:test
          --tests com.ispf.server.api.ListDevicesLoadTest
          --no-daemon
          -Dorg.gradle.workers.max=1

  web-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Install, test, and build
        working-directory: apps/web-console
        run: |
          npm ci
          npm test
          npx playwright install chromium --with-deps
          npm run test:e2e
          npm run build
