name: Load test gate

on:
  workflow_dispatch:
    inputs:
      p99_ceiling_ms:
        description: "P99 latency ceiling (ms) for EventFireLoadTest / ListDevicesLoadTest"
        required: false
        default: "3000"
  schedule:
    # Nightly 03:00 UTC — regression gate for automation throughput (BL-113)
    - cron: "0 3 * * *"

jobs:
  jvm-load-gate:
    runs-on: ubuntu-latest
    env:
      ISPF_LOAD_P99_CEILING_MS: ${{ inputs.p99_ceiling_ms || '3000' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Scale gate — list_devices p99
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.api.ListDevicesLoadTest \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            2>&1 | tee load-test-list-devices.log

      - name: Scale gate — events fire/list p99
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.api.EventFireLoadTest \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            2>&1 | tee load-test-event-fire.log

      - name: Scale gate — analytics multi-tag query p95
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.platform.analytics.AnalyticsMultiTagQueryLoadTest \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            2>&1 | tee load-test-analytics-query.log

      - name: Scale gate — historian aggregate 1M p95 (BL-161)
        env:
          ISPF_HISTORIAN_AGGREGATE_SAMPLE_COUNT: "1000000"
          ISPF_HISTORIAN_AGGREGATE_P95_CEILING_MS: "2000"
        run: |
          set -o pipefail
          ./gradlew \
            :packages:ispf-server:test \
            --tests com.ispf.server.history.HistorianAggregateQueryLoadTest \
            --no-daemon \
            -Dorg.gradle.workers.max=1 \
            2>&1 | tee load-test-historian-aggregate.log

      - name: Upload load test logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: load-test-jvm-${{ github.run_id }}
          path: |
            load-test-list-devices.log
            load-test-event-fire.log
            load-test-analytics-query.log
            load-test-historian-aggregate.log
          retention-days: 14
