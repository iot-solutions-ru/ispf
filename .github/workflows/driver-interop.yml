name: Driver interop

on:
  pull_request:
    paths:
      - "packages/ispf-driver-*/**"
      - "packages/ispf-server/src/main/java/com/ispf/server/driver/**"
      - ".github/workflows/driver-interop.yml"
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - ispf-driver-virtual
          - ispf-driver-mqtt
          - ispf-driver-modbus
          - ispf-driver-modbus-rtu
          - ispf-driver-flexible
          - ispf-driver-opcua
          - ispf-driver-snmp
          - ispf-driver-bacnet
          - ispf-driver-s7
          - ispf-driver-http
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Run driver tests (${{ matrix.module }})
        id: test
        run: ./gradlew :packages:${{ matrix.module }}:test --no-daemon

      - name: Record interop result
        if: always()
        run: |
          echo "## Driver interop (${{ matrix.module }})" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "Result: **pass** ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: **fail** ❌" >> "$GITHUB_STEP_SUMMARY"
          fi

  summary:
    needs: matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Interop matrix complete
        run: echo "Driver interop matrix finished (see job summaries per pack)." >> "$GITHUB_STEP_SUMMARY"
