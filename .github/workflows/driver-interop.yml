name: Driver interop

on:
  pull_request:
    paths:
      - "packages/ispf-driver-*/**"
      - "packages/ispf-server/src/main/java/com/ispf/server/driver/**"
      - ".github/workflows/driver-interop.yml"
      - "deploy/driver-interop/**"
      - "deploy/tools/driver-interop-report.sh"
      - "deploy/tools/driver-interop-smoke.sh"
  workflow_dispatch:

jobs:
  docker-fixtures-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Make smoke script executable
        run: chmod +x deploy/tools/driver-interop-smoke.sh

      - name: Start OT docker fixtures (BL-141)
        run: docker compose -f deploy/driver-interop/docker-compose.yml up -d --wait

      - name: Smoke MQTT / Modbus / OPC UA endpoints
        run: deploy/tools/driver-interop-smoke.sh

      - name: Tear down fixtures
        if: always()
        run: docker compose -f deploy/driver-interop/docker-compose.yml down -v

  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - ispf-driver-virtual
          - ispf-driver-mqtt
          - ispf-driver-modbus
          - ispf-driver-modbus-rtu
          - ispf-driver-modbus-udp
          - ispf-driver-flexible
          - ispf-driver-opcua
          - ispf-driver-opcua-server
          - ispf-driver-snmp
          - ispf-driver-bacnet
          - ispf-driver-s7
          - ispf-driver-http
          - ispf-driver-iec104
          - ispf-driver-iec104-server
          - ispf-driver-dnp3
          - ispf-driver-dlms
          - ispf-driver-ethernet-ip
          - ispf-driver-opc-da
          - ispf-driver-opc-bridge
          - ispf-driver-gps-tracker
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Run driver tests (${{ matrix.module }})
        id: test
        run: |
          START_MS=$(date +%s%3N)
          ./gradlew :packages:${{ matrix.module }}:test --no-daemon
          END_MS=$(date +%s%3N)
          echo "duration_ms=$((END_MS - START_MS))" >> "$GITHUB_OUTPUT"

      - name: Record interop result
        if: always()
        run: |
          echo "## Driver interop (${{ matrix.module }})" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "Result: **pass** ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: **fail** ❌" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.test.outputs.duration_ms }}" ]; then
            echo "Duration: ${{ steps.test.outputs.duration_ms }} ms" >> "$GITHUB_STEP_SUMMARY"
          fi

  summary:
    needs: [matrix, docker-fixtures-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Make scripts executable
        run: chmod +x gradlew deploy/tools/driver-interop-report.sh

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Generate interop report
        if: always()
        run: deploy/tools/driver-interop-report.sh --ci-summary

      - name: Interop matrix complete
        run: echo "Driver interop matrix finished (see job summaries per pack)." >> "$GITHUB_STEP_SUMMARY"

  pr-comment:
    needs: [matrix, docker-fixtures-smoke]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post driver interop PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          MATRIX_RESULT: ${{ needs.matrix.result }}
          FIXTURES_RESULT: ${{ needs.docker-fixtures-smoke.result }}
        with:
          script: |
            const marker = '<!-- driver-interop-status -->';
            const pass = process.env.MATRIX_RESULT === 'success' && process.env.FIXTURES_RESULT === 'success';
            const body = `${marker}
            ## Driver interop ${pass ? '✅ pass' : '❌ fail'}

            Matrix result: **${process.env.MATRIX_RESULT}**
            Docker fixtures smoke: **${process.env.FIXTURES_RESULT}**

            Per-driver summaries: [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  production-gate:
    needs: [matrix, docker-fixtures-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Verify PRODUCTION↔interop matrix gate (BL-85 / BL-140)
        run: >
          ./gradlew
          :packages:ispf-server:test
          --tests com.ispf.server.driver.DriverInteropWorkflowGateTest
          --tests com.ispf.server.driver.DriverProductionMatrixTest
          --no-daemon
