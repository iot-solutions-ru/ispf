# ISPF app stack on application host. PostgreSQL + Scylla + ClickHouse on DB host.
# Usage: ISPF_LAB_ROOT=~/ispf docker compose --env-file lab-stress.env -f lab-test-host-compose.yml up -d
name: ispf-lab

services:
  ispf-server:
    image: eclipse-temurin:25-jre-jammy
    restart: unless-stopped
    working_dir: /opt/ispf
    volumes:
      - ./:/opt/ispf
    environment:
      ISPF_LAB_DB_HOST: "${ISPF_LAB_DB_HOST:-198.51.100.10}"
      ISPF_DB_URL: jdbc:postgresql://${ISPF_LAB_DB_HOST:-198.51.100.10}:5432/ispf
      ISPF_DB_USER: ispf
      ISPF_DB_PASSWORD: ${ISPF_DB_PASSWORD:-CHANGE_ME_POSTGRES}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${ISPF_LAB_DB_HOST:-198.51.100.10}:5432/ispf
      SPRING_DATASOURCE_USERNAME: ispf
      SPRING_DATASOURCE_PASSWORD: ${ISPF_DB_PASSWORD:-CHANGE_ME_POSTGRES}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      ISPF_SERVER_PORT: "8080"
      ISPF_ENVIRONMENT: lab
      ISPF_BOOTSTRAP_FIXTURES_ENABLED: "${ISPF_BOOTSTRAP_FIXTURES_ENABLED:-false}"
      ISPF_MQTT_ENABLED: "true"
      ISPF_MQTT_BROKER_URL: tcp://${ISPF_MQTT_BROKER_HOST:-198.51.100.10}:${ISPF_MQTT_BROKER_PORT:-1883}
      ISPF_AI_PROVIDER: noop
      ISPF_EVENT_JOURNAL_STORE: "${ISPF_EVENT_JOURNAL_STORE:-scylla}"
      ISPF_EVENT_JOURNAL_CASSANDRA_CONTACT_POINTS: ${ISPF_LAB_DB_HOST:-198.51.100.10}
      ISPF_EVENT_JOURNAL_CASSANDRA_PORT: "9042"
      ISPF_EVENT_JOURNAL_CASSANDRA_LOCAL_DATACENTER: datacenter1
      ISPF_EVENT_JOURNAL_CASSANDRA_KEYSPACE: ispf
      ISPF_VARIABLE_HISTORY_STORE: "${ISPF_VARIABLE_HISTORY_STORE:-scylla}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_CONTACT_POINTS: ${ISPF_LAB_DB_HOST:-198.51.100.10}
      ISPF_VARIABLE_HISTORY_CASSANDRA_PORT: "9042"
      ISPF_VARIABLE_HISTORY_CASSANDRA_LOCAL_DATACENTER: datacenter1
      ISPF_VARIABLE_HISTORY_CASSANDRA_KEYSPACE: ispf
      ISPF_VARIABLE_HISTORY_CLICKHOUSE_URL: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_URL:-}
      ISPF_VARIABLE_HISTORY_CLICKHOUSE_DATABASE: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_DATABASE:-ispf}
      ISPF_VARIABLE_HISTORY_CLICKHOUSE_TABLE: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_TABLE:-variable_samples}
      ISPF_VARIABLE_HISTORY_CLICKHOUSE_USERNAME: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_USERNAME:-}
      ISPF_VARIABLE_HISTORY_CLICKHOUSE_PASSWORD: ${ISPF_VARIABLE_HISTORY_CLICKHOUSE_PASSWORD:-}
      ISPF_EVENT_JOURNAL_CLICKHOUSE_URL: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_URL:-}
      ISPF_EVENT_JOURNAL_CLICKHOUSE_DATABASE: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_DATABASE:-ispf}
      ISPF_EVENT_JOURNAL_CLICKHOUSE_TABLE: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_TABLE:-event_history}
      ISPF_EVENT_JOURNAL_CLICKHOUSE_USERNAME: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_USERNAME:-}
      ISPF_EVENT_JOURNAL_CLICKHOUSE_PASSWORD: ${ISPF_EVENT_JOURNAL_CLICKHOUSE_PASSWORD:-}
      ISPF_DRIVER_PACKS_DIR: /opt/ispf/data/drivers
      ISPF_RUNTIME_TELEMETRY_ENABLED: "true"
      ISPF_SECURITY_RBAC_ENABLED: "true"
      ISPF_SECURITY_TOKEN_AUTH_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: local
      JAVA_TOOL_OPTIONS: "${ISPF_JAVA_OPTS:--Xms512m -Xmx4g}"
      ISPF_EVENT_JOURNAL_ENABLED: "${ISPF_EVENT_JOURNAL_ENABLED:-false}"
      ISPF_EVENT_JOURNAL_ASYNC_ENABLED: "${ISPF_EVENT_JOURNAL_ASYNC_ENABLED:-true}"
      ISPF_EVENT_JOURNAL_WRITER_THREADS: "${ISPF_EVENT_JOURNAL_WRITER_THREADS:-2}"
      ISPF_EVENT_JOURNAL_QUEUE_CAPACITY: "${ISPF_EVENT_JOURNAL_QUEUE_CAPACITY:-10000}"
      ISPF_EVENT_JOURNAL_BATCH_SIZE: "${ISPF_EVENT_JOURNAL_BATCH_SIZE:-200}"
      ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS: "${ISPF_EVENT_JOURNAL_FLUSH_INTERVAL_MS:-100}"
      ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE: "${ISPF_EVENT_JOURNAL_RECENT_CACHE_SIZE:-2000}"
      ISPF_EVENT_JOURNAL_CASSANDRA_PARTITION_BATCH: "${ISPF_EVENT_JOURNAL_CASSANDRA_PARTITION_BATCH:-200}"
      ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES: "${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES:-64}"
      ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES_MIN: "${ISPF_EVENT_JOURNAL_CASSANDRA_PARALLEL_BATCHES_MIN:-1}"
      ISPF_EVENT_JOURNAL_CASSANDRA_ELASTIC_PARALLEL: "${ISPF_EVENT_JOURNAL_CASSANDRA_ELASTIC_PARALLEL:-true}"
      ISPF_EVENT_JOURNAL_CASSANDRA_GLOBAL_TABLE_ENABLED: "${ISPF_EVENT_JOURNAL_CASSANDRA_GLOBAL_TABLE_ENABLED:-false}"
      ISPF_EVENT_JOURNAL_CASSANDRA_ASYNC_COUNTER_UPDATE: "${ISPF_EVENT_JOURNAL_CASSANDRA_ASYNC_COUNTER_UPDATE:-true}"
      ISPF_DRIVER_MQTT_CALLBACK_THREADS: "${ISPF_DRIVER_MQTT_CALLBACK_THREADS:-4}"
      ISPF_DRIVER_MQTT_CALLBACK_QUEUE_CAPACITY: "${ISPF_DRIVER_MQTT_CALLBACK_QUEUE_CAPACITY:-10000}"
      ISPF_OBJECT_CHANGE_ASYNC_ENABLED: "${ISPF_OBJECT_CHANGE_ASYNC_ENABLED:-true}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_ENABLED: "${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_ENABLED:-true}"
      ISPF_RUNTIME_TELEMETRY_FAST_HISTORIAN_PATH: "${ISPF_RUNTIME_TELEMETRY_FAST_HISTORIAN_PATH:-true}"
      ISPF_VARIABLE_HISTORY_MIN_INTERVAL_MS: "${ISPF_VARIABLE_HISTORY_MIN_INTERVAL_MS:-5000}"
      ISPF_VARIABLE_HISTORY_BENCHMARK_SPREAD_SAMPLED_AT: "${ISPF_VARIABLE_HISTORY_BENCHMARK_SPREAD_SAMPLED_AT:-false}"
      ISPF_VARIABLE_HISTORY_OVERFLOW_COALESCE: "${ISPF_VARIABLE_HISTORY_OVERFLOW_COALESCE:-true}"
      ISPF_VARIABLE_HISTORY_WRITER_THREADS: "${ISPF_VARIABLE_HISTORY_WRITER_THREADS:-4}"
      ISPF_VARIABLE_HISTORY_QUEUE_CAPACITY: "${ISPF_VARIABLE_HISTORY_QUEUE_CAPACITY:-50000}"
      ISPF_VARIABLE_HISTORY_BATCH_SIZE: "${ISPF_VARIABLE_HISTORY_BATCH_SIZE:-1000}"
      ISPF_VARIABLE_HISTORY_FLUSH_INTERVAL_MS: "${ISPF_VARIABLE_HISTORY_FLUSH_INTERVAL_MS:-20}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_PARTITION_BATCH: "${ISPF_VARIABLE_HISTORY_CASSANDRA_PARTITION_BATCH:-200}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES: "${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES:-64}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES_MIN: "${ISPF_VARIABLE_HISTORY_CASSANDRA_PARALLEL_BATCHES_MIN:-1}"
      ISPF_VARIABLE_HISTORY_CASSANDRA_ELASTIC_PARALLEL: "${ISPF_VARIABLE_HISTORY_CASSANDRA_ELASTIC_PARALLEL:-true}"
      ISPF_VARIABLE_HISTORY_WRITER_THREADS_MIN: "${ISPF_VARIABLE_HISTORY_WRITER_THREADS_MIN:-4}"
      ISPF_VARIABLE_HISTORY_WRITER_THREADS_MAX: "${ISPF_VARIABLE_HISTORY_WRITER_THREADS_MAX:-32}"
      ISPF_VARIABLE_HISTORY_ELASTIC_WRITER_ENABLED: "${ISPF_VARIABLE_HISTORY_ELASTIC_WRITER_ENABLED:-true}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_ELASTIC_WORKERS: "${ISPF_RUNTIME_TELEMETRY_INGRESS_ELASTIC_WORKERS:-true}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MIN: "${ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MIN:-4}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MAX: "${ISPF_RUNTIME_TELEMETRY_INGRESS_WORKERS_MAX:-32}"
      ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_ELASTIC: "${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_ELASTIC:-true}"
      ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_THREADS_MAX: "${ISPF_RUNTIME_TELEMETRY_COALESCE_SCHEDULER_THREADS_MAX:-32}"
      ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_ELASTIC: "${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_ELASTIC:-true}"
      ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_THREADS_MAX: "${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_THREADS_MAX:-32}"
      ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_COALESCE: "${ISPF_MQTT_GATEWAY_INGRESS_DISPATCH_COALESCE:-true}"
      ISPF_MQTT_GATEWAY_INGRESS_BYPASS_L3: "${ISPF_MQTT_GATEWAY_INGRESS_BYPASS_L3:-false}"
      ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_COALESCE: "${ISPF_RUNTIME_TELEMETRY_INGRESS_QUEUE_COALESCE:-true}"
      ISPF_RUNTIME_TELEMETRY_COALESCE_ENABLED: "${ISPF_RUNTIME_TELEMETRY_COALESCE_ENABLED:-true}"
      ISPF_DRIVER_MQTT_INGRESS_COALESCE: "${ISPF_DRIVER_MQTT_INGRESS_COALESCE:-true}"
      ISPF_BINDING_ASYNC_COALESCE: "${ISPF_BINDING_ASYNC_COALESCE:-true}"
    command: ["java", "-jar", "/opt/ispf/ispf-server.jar"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${ISPF_LAB_HTTP_BIND:-0.0.0.0}:${ISPF_LAB_HTTP_PORT:-8000}:80"
    volumes:
      - ./web-console:/usr/share/nginx/html:ro
      - ./nginx-lab.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ispf-server
