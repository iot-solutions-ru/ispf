name: ISPF bundle validate

on:
  push:
    paths:
      - "**/bundle.json"
      - ".github/workflows/bundle-ci.yml"
  pull_request:
    paths:
      - "**/bundle.json"
  workflow_dispatch:

jobs:
  validate-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate bundle manifest
        env:
          ISPF_BASE_URL: ${{ secrets.ISPF_BASE_URL }}
          ISPF_API_TOKEN: ${{ secrets.ISPF_API_TOKEN }}
          BUNDLE_PATH: examples/warehouse-app/bundle.json
          APP_ID: warehouse
        run: |
          if [ -z "$ISPF_BASE_URL" ]; then
            echo "ISPF_BASE_URL secret not set — skipping remote validate (copy template and configure secrets)"
            exit 0
          fi
          node tools/bundle-validate-cli/validate.mjs "$BUNDLE_PATH" "$APP_ID"
