    <text x="52" y="26" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600">DGU</text>
    <text x="52" y="46" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">reserve</text>
    <text x="52" y="62" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">~500 kW</text>
  </g>

  <g transform="translate(728,72)">
    <line x1="0" y1="40" x2="24" y2="40" stroke="#58a6ff" stroke-width="3"/>
    <line x1="24" y1="28" x2="24" y2="52" stroke="#e6edf3" stroke-width="3"/>
    <line x1="14" y1="52" x2="34" y2="28" stroke="#e6edf3" stroke-width="3"/>
    <line x1="24" y1="40" x2="48" y2="40" stroke="#58a6ff" stroke-width="3"/>
    <rect x="48" y="0" width="108" height="80" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="102" y="28" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600">RUMB</text>
    <text x="102" y="48" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">10 / 0.4 kV</text>
    <text x="102" y="64" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">breaker</text>
