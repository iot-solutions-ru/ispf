  <g transform="translate(900,56)">
    <line x1="0" y1="56" x2="20" y2="56" stroke="#58a6ff" stroke-width="3"/>
    <rect x="20" y="12" width="120" height="96" rx="6" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="80" y="40" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600">Load</text>
    <text x="80" y="60" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">load module</text>
    <text x="80" y="76" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="10">consumers</text>
  </g>

  <g transform="translate(32,248)">
    <rect width="1056" height="88" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="20" y="26" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="600">Legend</text>
    <circle cx="36" cy="48" r="5" fill="#3fb950"/>
    <text x="50" y="52" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">generation / normal</text>
    <circle cx="220" cy="48" r="5" fill="#f0883e"/>
    <text x="234" y="52" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">gas path</text>
    <circle cx="360" cy="48" r="5" fill="#a371f7"/>
    <text x="374" y="52" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">DGU reserve</text>
    <line x1="36" y1="72" x2="76" y2="72" stroke="#58a6ff" stroke-width="3"/>
    <text x="86" y="76" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">10 kV power bus</text>
    <text x="520" y="52" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Island mode: power from on-site generation</text>
    <text x="520" y="76" fill="#8b949e" font-family="Segoe UI, system-ui, sans-serif" font-size="11">Plant rating: 3 x 1480 kW GPU + DGU reserve</text>
  </g>
