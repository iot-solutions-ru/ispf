<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="160" viewBox="0 0 920 160" role="img" aria-labelledby="title">
  <title id="title">ISPF flow: OT drivers to object tree to HMI, alerts, BPMN, operators</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#57606a"/>
    </marker>
  </defs>
  <rect width="920" height="160" fill="#f6f8fa" rx="8"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#24292f">
    <rect x="24" y="56" width="120" height="48" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="84" y="85" text-anchor="middle">OT drivers</text>
    <rect x="200" y="56" width="120" height="48" rx="8" fill="#ffffff" stroke="#0969da" stroke-width="2"/>
    <text x="260" y="85" text-anchor="middle" font-weight="600">Object tree</text>
    <rect x="376" y="24" width="100" height="40" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="426" y="49" text-anchor="middle">HMI</text>
    <rect x="376" y="96" width="100" height="40" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="426" y="121" text-anchor="middle">Alerts</text>
    <rect x="532" y="96" width="100" height="40" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="582" y="121" text-anchor="middle">BPMN</text>
    <rect x="688" y="56" width="120" height="48" rx="8" fill="#ffffff" stroke="#1a7f37" stroke-width="2"/>
    <text x="748" y="85" text-anchor="middle" font-weight="600">Operators</text>
    <line x1="144" y1="80" x2="196" y2="80" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="320" y1="70" x2="372" y2="44" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="320" y1="90" x2="372" y2="116" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="476" y1="116" x2="528" y2="116" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="476" y1="44" x2="688" y2="70" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="632" y1="116" x2="688" y2="90" stroke="#57606a" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
</svg>
